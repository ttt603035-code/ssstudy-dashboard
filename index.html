// Exercise Card
function exerciseCard(e) {
  const subtasks = e.subtasks||[];
  const totalSt = subtasks.length;
  const doneSt = subtasks.filter(st=>st.completed).length;
  const checked = e.status==='completed';
  const isOverdue = checkIsOverdue(e.dueDate, checked);

  return `<div class="ex-card ${checked?'completed':''} ${e.pinned?'pinned':''}" data-id="${e.id}">
    <div class="ex-row">
      <span class="drag-handle">::</span>
      <div class="ex-check ${checked?'checked':''}" onclick="toggleExerciseMain('${e.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L19 7"/></svg>
      </div>
      <span class="ex-subject-tag" style="background:${customSubjects[e.subject]?.tint||'var(--bg-elev)'};color:${customSubjects[e.subject]?.color||'var(--ink)'}">${customSubjects[e.subject]?.label||e.subject}</span>
      <div class="ex-body">
        <div class="ex-title-row">
          ${e.pinned?'<span style="font-size:10px;font-weight:700;color:var(--yellow);background:rgba(255,214,10,0.12);padding:2px 6px;border-radius:4px">Pinned</span>':''}
          <span class="priority-tag priority-${e.priority||'medium'}">${(e.priority||'medium').charAt(0).toUpperCase()+(e.priority||'medium').slice(1)}</span>
          <div class="ex-title">${esc(e.title)}</div>
        </div>
        <div class="ex-meta">
          ${e.chapter?`<span>${esc(e.chapter)}</span>`:''}
          ${e.dueDate?`<span style="${isOverdue?'color:var(--red);font-weight:700':''}">Due ${e.dueDate} ${isOverdue?'(Overdue!)':''}</span>`:''}
          ${totalSt?`<span style="background:var(--bg-elev);padding:1px 6px;border-radius:4px;font-weight:600">${doneSt}/${totalSt} done</span>`:''}
        </div>
      </div>
      <span class="ex-status ${e.status}">${e.status==='pending'?'Pending':'Done'}</span>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
        <button class="ex-tool-btn pin ${e.pinned?'active':''}" onclick="togglePinExercise('${e.id}')">Pin</button>
        <button class="apple-btn small" onclick="openEditExerciseModal('${e.id}')">Edit</button>
        <button class="ex-tool-btn delete" onclick="deleteExercise('${e.id}')">Del</button>
      </div>
    </div>
    <div class="subtasks-area">
      ${subtasks.map(st=>{const stOverdue=checkIsOverdue(st.dueDate,st.completed);return `<div class="subtask-item"><div class="subtask-left" onclick="toggleSubtask('${e.id}','${st.id}')"><div class="st-check ${st.completed?'checked':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L19 7"/></svg></div><span class="st-text ${st.completed?'checked':''}">${esc(st.title)}</span>${st.dueDate?`<span class="st-due ${stOverdue?'overdue':''}">Due ${st.dueDate}${stOverdue?' (Overdue)':''}</span>`:''}</div></div>`;}).join('')}
    </div>
  </div>`;
}

// Resource Actions
function toggleResourceStatus(id) { const r=resources.find(x=>x.id===id);if(r)r.status=r.status==='completed'?'pending':'completed';saveResState();render(); }
function deleteResource(id) { resources=resources.filter(x=>x.id!==id);saveResState();render(); }
function togglePinExercise(id) { const e=exercises.find(x=>x.id===id);if(e)e.pinned=!e.pinned;saveResState();render(); }
function toggleExerciseMain(id) { const e=exercises.find(x=>x.id===id);if(e){e.status=e.status==='pending'?'completed':'pending';if(e.subtasks?.length)e.subtasks.forEach(st=>{st.completed=e.status==='completed';});}saveResState();render(); }
function toggleSubtask(exId,stId) { const e=exercises.find(x=>x.id===exId);if(!e?.subtasks)return;const st=e.subtasks.find(s=>s.id===stId);if(st){st.completed=!st.completed;e.status=e.subtasks.every(s=>s.completed)?'completed':'pending';}saveResState();render(); }
function deleteExercise(id) { exercises=exercises.filter(x=>x.id!==id);saveResState();render(); }

function checkIsOverdue(due,completed) { if(completed||!due)return false; return due<todayISO(); }
function getOverdueCount() { let c=0;exercises.forEach(ex=>{if(ex.status!=='completed'&&checkIsOverdue(ex.dueDate,false))c++;(ex.subtasks||[]).forEach(st=>{if(!st.completed&&checkIsOverdue(st.dueDate,false))c++;});});return c; }
function getCountdownDays() {
  if(!countdownConfig.targetDate) return '-- Days';
  const t=new Date(countdownConfig.targetDate);const n=new Date();n.setHours(0,0,0,0);t.setHours(0,0,0,0);
  const d=Math.ceil((t-n)/(86400000));
  if(d>0) return d+' Days';if(d===0) return 'Today!';return 'Passed';
}

// Note selection highlight for Study Resources
function handleNoteSelection(subj) {
  const sel=window.getSelection();if(!sel||sel.isCollapsed)return;
  const text=sel.toString().trim();if(!text)return;
  const sc=subjectScores[subj];if(!sc||!sc.note)return;
  if(sc.note.includes(text)&&!sc.note.includes('=='+text+'==')){sc.note=sc.note.replace(text,'=='+text+'==');sel.removeAllRanges();saveResState();render();}
}

// Overdue
function openOverdueModal() {
  const items=[];
  exercises.forEach(ex=>{if(ex.status!=='completed'&&checkIsOverdue(ex.dueDate,false))items.push({type:'Exercise',title:ex.title,due:ex.dueDate,id:ex.id});(ex.subtasks||[]).forEach(st=>{if(!st.completed&&checkIsOverdue(st.dueDate,false))items.push({type:'Subtask of '+ex.title,title:st.title,due:st.dueDate,id:ex.id});});});
  const html = items.length ? items.map(it=>`<div style="padding:10px;background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.2);border-radius:var(--radius-sm);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:10px;font-weight:700;color:var(--red)">[${esc(it.type)}]</span><div style="font-size:13px;font-weight:600;margin-top:2px">${esc(it.title)}</div></div><span style="font-size:12px;font-weight:700;color:var(--red)">Due ${it.due}</span></div>`).join('') : `<div class="empty-state">No overdue items! !</div>`;
  openGenericSheet('! Overdue ('+items.length+')',html,[{text:'Close',cls:'primary',onclick:()=>closeSheet('genericSheet')}]);
}

let currentSuggestTab = 'notes';

function openStudySuggest() {
  openSheet('suggestSheet');
  switchSuggestTab('notes');
}

function switchSuggestTab(tab) {
  currentSuggestTab = tab;
  document.querySelectorAll('.suggest-tab').forEach(el => el.classList.toggle('active', el.dataset.stab===tab));
  renderSuggestContent();
}

function renderSuggestContent() {
  const el = document.getElementById('suggestContent');
  if (currentSuggestTab === 'notes') {
    el.innerHTML = `
      <div class="notes-toolbar">
        <button onclick="document.execCommand('bold')"><b>B</b></button>
        <button onclick="document.execCommand('italic')"><i>I</i></button>
        <button onclick="document.execCommand('underline')"><u>U</u></button>
        <button onclick="document.execCommand('hiliteColor',false,'rgba(0,0,0,0.08)')">Highlight</button>
        <button onclick="document.execCommand('strikethrough')"><s>S</s></button>
      </div>
      <div class="notes-editor" contenteditable="true" id="notesEditor" oninput="autoSaveNotes()">${studySuggest.notes||''}</div>
      <div style="font-size:11px;color:var(--ink-tertiary);margin-top:8px">Auto-saved · Supports bold, italic, underline, highlight</div>
    `;
  } else if (currentSuggestTab === 'links') {
    const links = studySuggest.links || [];
    el.innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="linkSearch" placeholder="Search links..." style="flex:1" oninput="filterLinks(this.value)"/>
        <button class="apple-btn primary" onclick="addLink()">+ Add Link</button>
      </div>
      <div id="linksList">${links.map((l,i)=>`
        <div class="link-card" data-title="${esc(l.title).toLowerCase()}" data-url="${esc(l.url).toLowerCase()}" data-desc="${esc(l.description||'').toLowerCase()}">
          <span class="link-fav ${l.favorite?'active':''}" onclick="toggleLinkFav(${i})" style="font-size:14px;font-weight:700">*</span>
          <div class="link-info">
            <div class="link-title">${esc(l.title)}</div>
            <div class="link-url">${esc(l.url)}</div>
            ${l.category?`<div class="link-cat">${esc(l.category)}</div>`:''}
            ${l.description?`<div style="font-size:11px;color:var(--ink-tertiary);margin-top:2px">${esc(l.description)}</div>`:''}
          </div>
          <div style="display:flex;gap:4px">
            <button class="apple-btn small" onclick="editLink(${i})">Edit</button>
            <button class="apple-btn small danger" onclick="deleteLink(${i})">Del</button>
          </div>
        </div>
      `).join('')}</div>
      ${!links.length?'<div class="empty-state">No links yet. Click "+ Add Link"</div>':''}
    `;
  } else if (currentSuggestTab === 'highlights') {
    const hls = quizState.highlights;
    el.innerHTML = `<div style="font-size:12px;color:var(--ink-tertiary);margin-bottom:12px">${hls.length} highlights from Quiz Hub reading passages</div>
      ${hls.length ? hls.map(h=>`<div class="list-item"><h4 style="font-size:12px">${esc(h.selectedText)}</h4><div class="meta" style="display:flex;gap:6px;align-items:center"><span class="chip" style="background:${h.highlightColor==='yellow'?'rgba(255,214,10,0.2)':h.highlightColor==='blue'?'rgba(100,210,255,0.2)':'rgba(255,55,95,0.2)'}">${h.highlightColor}</span>${h.note?`<span>${esc(h.note)}</span>`:''}</div></div>`).join('') : '<div class="empty-state">No highlights yet. Select text in reading passages to highlight.</div>'}
    `;
  }
}

function autoSaveNotes() {
  const el = document.getElementById('notesEditor');
  if (el) { studySuggest.notes = el.innerHTML; saveSuggest(); }
}

function addLink() {
  openGenericSheet('Add Link',`
    <div class="field"><label>Title</label><input id="linkTitle"/></div>
    <div class="field"><label>URL</label><input id="linkUrl" placeholder="https://..."/></div>
    <div class="field"><label>Category</label><input id="linkCat" placeholder="e.g. Reference, Video"/></div>
    <div class="field"><label>Description</label><textarea id="linkDesc" rows="2"></textarea></div>
  `,[
    {text:'Cancel',onclick:()=>closeSheet('genericSheet')},
    {text:'Add',cls:'primary',onclick:()=>{
      const title=document.getElementById('linkTitle').value.trim();if(!title){toast('Title required');return;}
      if(!studySuggest.links) studySuggest.links=[];
      studySuggest.links.push({title,url:document.getElementById('linkUrl').value.trim(),category:document.getElementById('linkCat').value.trim(),description:document.getElementById('linkDesc').value.trim(),favorite:false});
      saveSuggest();closeSheet('genericSheet');renderSuggestContent();
    }}
  ]);
}

function editLink(idx) {
  const l = studySuggest.links[idx]; if(!l) return;
  openGenericSheet('Edit Link',`
    <div class="field"><label>Title</label><input id="linkTitle" value="${esc(l.title)}"/></div>
    <div class="field"><label>URL</label><input id="linkUrl" value="${esc(l.url||'')}"/></div>
    <div class="field"><label>Category</label><input id="linkCat" value="${esc(l.category||'')}"/></div>
    <div class="field"><label>Description</label><textarea id="linkDesc" rows="2">${esc(l.description||'')}</textarea></div>
  `,[
    {text:'Cancel',onclick:()=>closeSheet('genericSheet')},
    {text:'Save',cls:'primary',onclick:()=>{
      l.title=document.getElementById('linkTitle').value.trim();l.url=document.getElementById('linkUrl').value.trim();l.category=document.getElementById('linkCat').value.trim();l.description=document.getElementById('linkDesc').value.trim();
      saveSuggest();closeSheet('genericSheet');renderSuggestContent();
    }}
  ]);
}

function deleteLink(idx) { if(!confirm('Delete this link?'))return; studySuggest.links.splice(idx,1); saveSuggest(); renderSuggestContent(); }
function toggleLinkFav(idx) { studySuggest.links[idx].favorite=!studySuggest.links[idx].favorite; saveSuggest(); renderSuggestContent(); }
function filterLinks(q) {
  const ql=q.toLowerCase();
  document.querySelectorAll('#linksList .link-card').forEach(el=>{
    const match = el.dataset.title.includes(ql)||el.dataset.url.includes(ql)||el.dataset.desc.includes(ql);
    el.style.display = match?'':'none';
  });
}

// ================================================================
//  UNIFIED IMPORT / EXPORT
// ================================================================
function exportAllData() {
  const backup = {
    version:'unified-2026',
    exportDate:new Date().toISOString(),
    appState,
    quizData:{...quizState},
    resources:{customSubjects,resources,exercises,subjectScores,countdownConfig},
    studySuggest
  };
  downloadJSON(backup,'study_dashboard_full_backup_'+todayISO()+'.json');
  toast('Full backup exported OK');
}

function importAllData(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.appState) appState = Object.assign(appState, data.appState);
      if(data.quizData) { importQuizData(data.quizData); }
      if(data.resources) {
        if(data.resources.customSubjects) customSubjects = data.resources.customSubjects;
        if(data.resources.resources) resources = data.resources.resources;
        if(data.resources.exercises) exercises = data.resources.exercises;
        if(data.resources.subjectScores) subjectScores = data.resources.subjectScores;
        if(data.resources.countdownConfig) countdownConfig = data.resources.countdownConfig;
      }
      if(data.studySuggest) studySuggest = data.studySuggest;
      saveAll(); render();
      toast('Backup imported OK');
    } catch(err) { alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function downloadJSON(obj, filename) {
  const blob = new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

function openGenericSheet(title, bodyHTML, buttons) {
  document.getElementById('genericSheetTitle').textContent = title;
  document.getElementById('genericSheetBody').innerHTML = bodyHTML;
  const foot = document.getElementById('genericSheetFoot');
  foot.innerHTML = '';
  (buttons||[]).forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'apple-btn' + (b.cls?' '+b.cls:'');
    btn.textContent = b.text;
    btn.onclick = b.onclick;
    foot.appendChild(btn);
  });
  openSheet('genericSheet');
}
