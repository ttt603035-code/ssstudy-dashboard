<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz Hub</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #1a1a1a;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  button { font: inherit; cursor: pointer; }
  input, textarea, select { font: inherit; }

  /* ========== TOP TOOLBAR ========== */
  .toolbar {
    flex: 0 0 auto;
    background: #fff;
    border-bottom: 1px solid #e6e6e6;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar .brand {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: .2px;
    color: #111;
    margin-right: 4px;
    white-space: nowrap;
  }
  .section-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex: 1 1 auto;
    min-width: 0;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px 5px 12px;
    background: #f2f2f2;
    color: #333;
    border-radius: 999px;
    font-size: 13px;
    line-height: 1.4;
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: all .12s ease;
    max-width: 260px;
  }
  .pill:hover { background: #ebebeb; }
  .pill.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }
  .pill .pill-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pill .pill-act {
    opacity: .55;
    font-size: 11px;
    padding: 0 2px;
    border-radius: 4px;
  }
  .pill .pill-act:hover { opacity: 1; background: rgba(255,255,255,.15); }
  .pill:not(.active) .pill-act:hover { background: rgba(0,0,0,.06); }
  .pill.add {
    background: transparent;
    border: 1px dashed #bbb;
    color: #555;
  }
  .pill.add:hover { background: #f5f5f5; color: #111; border-color: #888; }
  .tb-btn {
    padding: 6px 12px;
    border: 1px solid #d0d0d0;
    background: #fff;
    border-radius: 6px;
    font-size: 13px;
    color: #333;
  }
  .tb-btn:hover { background: #f2f2f2; }
  .tb-btn.primary { background: #111; color:#fff; border-color:#111; }
  .tb-btn.primary:hover { background: #333; }

  /* ========== MAIN LAYOUT ========== */
  .main {
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
    overflow: hidden;
  }
  .pane {
    height: 100%;
    overflow: auto;
    background: #fff;
  }
  .pane-left { display: none; }   /* 阅读正文区已隐藏，做题区居中为主视图 */
  .pane-right { flex: 1 1 100%; background: #fbfbfb; }

  /* ========== READING ========== */
  .reading-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 40px 60px;
  }
  .reading-title {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
    color: #111;
  }
  .reading-sub {
    color: #888;
    font-size: 12px;
    margin-bottom: 24px;
  }
  .reading-body {
    font-size: 16.5px;
    line-height: 1.95;
    color: #222;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .reading-body .word {
    cursor: pointer;
    border-radius: 2px;
    padding: 0 1px;
  }
  .reading-body .word:hover { background: #eef4ff; }
  .reading-body .hl-yellow { background: #fff59d; }
  .reading-body .hl-blue   { background: #b3e5fc; }
  .reading-body .hl-pink   { background: #f8bbd0; }
  .reading-body .hl { cursor: pointer; border-radius: 2px; padding: 0 1px; }
  .reading-body .hl.has-note { box-shadow: inset 0 -2px 0 rgba(0,0,0,.35); }
  .reading-body .replaced { color: #b26a00; font-weight: 600; }

  /* Selection popup — Apple-style dark capsule with pill buttons */
  .sel-menu {
    position: absolute;
    z-index: 1000;
    background: #1c1c1e;
    color: #fff;
    border-radius: 999px;
    padding: 6px;
    display: flex;
    gap: 6px;
    box-shadow: 0 10px 30px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.2);
    font-size: 14px;
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    animation: selMenuIn .16s ease-out;
  }
  @keyframes selMenuIn {
    from { opacity: 0; transform: translateY(4px) scale(.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .sel-menu button {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.28);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.2;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s, border-color .12s, transform .08s;
    white-space: nowrap;
  }
  .sel-menu button:hover {
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.5);
  }
  .sel-menu button:active { transform: scale(.95); }
  .sel-menu .swatch {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* Word synonym popup */
  .word-pop {
    position: absolute;
    z-index: 1000;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 12px;
    min-width: 220px;
    max-width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    font-size: 13px;
  }
  .word-pop h4 {
    margin: 0 0 6px; font-size: 12px; color: #666; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .word-pop .syn-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .word-pop .syn-chip {
    background: #f2f2f2;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 12px;
  }
  .word-pop .syn-chip:hover { background: #111; color: #fff; }
  .word-pop .pop-actions { display: flex; gap: 6px; margin-top: 6px; }
  .word-pop .pop-actions button {
    flex: 1;
    background: #fff; border: 1px solid #d0d0d0;
    padding: 4px 8px; border-radius: 6px; font-size: 12px;
  }
  .word-pop .pop-actions button:hover { background: #f2f2f2; }

  /* Empty states */
  .empty {
    color: #999;
    font-size: 14px;
    text-align: center;
    padding: 60px 20px;
    line-height: 1.8;
  }

  /* ========== RIGHT PANE ========== */
  .right-tabs {
    display: flex;
    border-bottom: 1px solid #eaeaea;
    background: #fff;
    position: sticky; top: 0; z-index: 5;
  }
  .right-tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: transparent;
    border-left: none; border-right: none; border-top: none;
  }
  .right-tab.active {
    color: #111;
    border-bottom-color: #111;
    font-weight: 600;
  }
  .right-body {
    padding: 24px 20px 60px;
    max-width: 780px;    /* 居中显示，避免超宽屏做题区拉太开 */
    margin: 0 auto;
  }
  .section-title-bar {
    max-width: 780px;
    margin: 0 auto;
    padding: 20px 20px 0;
  }
  .section-title-bar h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
    color: #111;
    outline: none;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background .15s;
    cursor: text;
  }
  .section-title-bar h1:hover { background: #f5f5f5; }
  .section-title-bar h1:focus { background: #fff8e1; box-shadow: 0 0 0 2px #ffe082; }
  .section-title-bar .sub {
    color: #888;
    font-size: 12px;
    margin-bottom: 10px;
  }
  .quizset-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
  }
  .qs-active-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: #111;
    color: #fff;
    border-radius: 999px;
    font-size: 13px;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .qs-active-tag .qs-count { opacity: .7; font-size: 11px; }
  .qs-list-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    background: #f2f2f2;
    color: #333;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid transparent;
    user-select: none;
  }
  .qs-list-btn:hover { background: #ebebeb; }
  .qs-list-btn.add {
    background: transparent;
    border: 1px dashed #bbb;
    color: #555;
  }
  .qs-list-btn.add:hover { background: #f5f5f5; color: #111; border-color: #888; }

  /* 套题列表面板（下拉） */
  /* 套题下拉：iOS 毛玻璃深色悬浮 */
  .qs-panel {
    position: absolute;
    z-index: 1200;
    background: rgba(38, 38, 40, 0.82);
    color: #fff;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35), 0 4px 12px rgba(0,0,0,.2);
    min-width: 300px;
    max-width: 420px;
    max-height: 520px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 14px;
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    backdrop-filter: blur(30px) saturate(180%);
    animation: qsPanelIn .2s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes qsPanelIn {
    from { opacity: 0; transform: translateY(-4px) scale(.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .qs-panel-head {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .qs-panel-head input {
    flex: 1;
    padding: 7px 12px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,.1);
    color: #fff;
    font-size: 13px;
    outline: none;
  }
  .qs-panel-head input::placeholder { color: rgba(255,255,255,.4); }
  .qs-panel-actions {
    padding: 6px 12px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,.6);
  }
  .qs-panel-actions button {
    background: transparent; border: none;
    color: #4d9bff; cursor: pointer; padding: 2px 6px;
    font-size: 12px;
  }
  .qs-panel-actions button:hover { color: #fff; }
  .qs-panel-list {
    overflow: auto;
    max-height: 380px;
    padding: 4px 0;
  }
  .qs-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    cursor: pointer;
    color: rgba(255,255,255,.95);
    border-left: 3px solid transparent;
    transition: background .1s;
  }
  .qs-item:hover { background: rgba(255,255,255,.08); }
  .qs-item.checked { background: rgba(255,255,255,.12); }
  .qs-item.checked::before {
    content: "✓";
    color: #4d9bff;
    font-weight: 700;
    margin-right: 2px;
  }
  .qs-item input[type=checkbox] { display: none; }
  .qs-item .qs-nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qs-item .qs-mt { color: rgba(255,255,255,.5); font-size: 11px; }
  .qs-item .qs-mini-btn {
    color: rgba(255,255,255,.55); padding: 3px 8px; border-radius: 6px;
    font-size: 12px; background: transparent; border: none; cursor: pointer;
  }
  .qs-item .qs-mini-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
  .qs-panel-foot {
    padding: 10px 12px;
    border-top: 1px solid rgba(255,255,255,.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: rgba(255,255,255,.55);
  }
  .qs-panel-foot button {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,.2);
    background: transparent;
    color: rgba(255,255,255,.9);
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .qs-panel-foot button:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.35); }
  .qs-panel-foot button.primary { background: #fff; color: #111; border-color: #fff; font-weight: 600; }
  .qs-panel-foot button.primary:hover { background: rgba(255,255,255,.9); }
  .qs-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    background: #f2f2f2;
    color: #444;
    border-radius: 999px;
    font-size: 12.5px;
    line-height: 1.4;
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
    max-width: 220px;
  }
  .qs-pill:hover { background: #ebebeb; }
  .qs-pill.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }
  .qs-pill .qs-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .qs-pill .qs-act {
    opacity: .5;
    font-size: 11px;
    padding: 0 2px;
    border-radius: 4px;
  }
  .qs-pill .qs-act:hover { opacity: 1; background: rgba(0,0,0,.06); }
  .qs-pill.active .qs-act:hover { background: rgba(255,255,255,.15); }
  .qs-pill.add {
    background: transparent;
    border: 1px dashed #bbb;
    color: #666;
  }
  .qs-pill.add:hover { background: #f5f5f5; color: #111; border-color: #888; }

  .q-card {
    background: #fff;
    border: 1px solid #ececec;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,.02);
  }
  .q-meta { font-size: 11px; color: #999; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .q-tool-btn {
    padding: 3px 10px;
    font-size: 12px;
    border-radius: 999px;
    background: #f5f5f5;
    color: #555;
    border: 1px solid #eaeaea;
    cursor: pointer;
    line-height: 1.4;
  }
  .q-tool-btn:hover { background: #111; color: #fff; border-color: #111; }
  .q-text { font-size: 15px; line-height: 1.6; margin-bottom: 12px; color: #111; }
  .q-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .q-opt {
    padding: 8px 12px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    background: #fff;
    text-align: left;
    color: #333;
    transition: all .1s;
    -webkit-user-select: text;
    user-select: text;   /* 允许在选项按钮上选中文字 → 加入生词/同义词 */
  }
  .q-text { -webkit-user-select: text; user-select: text; }
  .q-opt:hover { background: #f7f7f7; border-color: #bbb; }
  .q-opt.selected { border-color: #111; background: #f2f2f2; }
  .q-opt.correct { border-color: #2e7d32; background: #e8f5e9; color: #1b5e20; }
  .q-opt.wrong { border-color: #c62828; background: #ffebee; color: #b71c1c; }
  .q-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .q-actions button {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 13px;
    border: 1px solid #d0d0d0;
    background: #fff;
    color: #333;
  }
  .q-actions button:hover { background: #f2f2f2; }
  .q-actions button.primary { background: #111; color: #fff; border-color: #111; }
  .q-actions button.primary:hover { background: #333; }
  .q-explain {
    margin-top: 10px;
    padding: 10px 12px;
    background: #fafafa;
    border-left: 3px solid #888;
    font-size: 13px;
    line-height: 1.6;
    color: #333;
    border-radius: 4px;
    display: none;
  }
  .q-explain.show { display: block; }
  .q-status { margin-top: 8px; font-size: 13px; font-weight: 600; }
  .q-status.ok { color: #2e7d32; }
  .q-status.err { color: #c62828; }

  /* ========== STATUS BAR ========== */
  .statusbar {
    flex: 0 0 auto;
    background: #fff;
    border-top: 1px solid #e6e6e6;
    padding: 10px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-card {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 4px 12px;
    background: #f5f5f5;
    border-radius: 8px;
    font-size: 12px;
    color: #666;
  }
  .stat-card .num { font-size: 16px; font-weight: 700; color: #111; }
  .status-tools { margin-left: auto; display: flex; gap: 8px; }
  .status-tools button {
    padding: 5px 12px;
    border: 1px solid #d0d0d0;
    background: #fff;
    border-radius: 6px;
    font-size: 12px;
    color: #333;
  }
  .status-tools button:hover { background: #f2f2f2; }

  /* ========== MODAL / DRAWER ========== */
  .modal-mask {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-mask.show { display: flex; }
  .modal-mask.full { padding: 0; background: rgba(0,0,0,.35); }
  .modal {
    background: #fff;
    border-radius: 12px;
    max-width: 720px;
    width: 100%;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .modal-mask.full .modal {
    max-width: none;
    width: 100%;
    height: 100%;
    max-height: 100%;
    border-radius: 0;
  }
  .modal-mask.full .modal-body {
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }
  .modal-mask.full .modal-foot {
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }
  .modal-head {
    padding: 14px 20px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head h3 { margin: 0; font-size: 16px; }
  .modal-head button {
    background: transparent; border: none; font-size: 20px; color: #666;
  }
  .modal-body { padding: 16px 20px; overflow: auto; flex: 1; }
  .modal-foot {
    padding: 12px 20px; border-top: 1px solid #eee;
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .modal-foot button {
    padding: 6px 16px;
    border: 1px solid #d0d0d0;
    background: #fff;
    border-radius: 6px;
    font-size: 13px;
  }
  .modal-foot button.primary { background: #111; color: #fff; border-color: #111; }
  .modal-foot button.danger { background: #c62828; color: #fff; border-color: #c62828; }

  .form-row { margin-bottom: 10px; }
  .form-row label {
    display: block; font-size: 12px; color: #666; margin-bottom: 4px;
  }
  .form-row input, .form-row textarea, .form-row select {
    width: 100%; padding: 8px 10px; border: 1px solid #d0d0d0; border-radius: 6px;
    font-size: 14px;
  }
  .form-row textarea { min-height: 80px; resize: vertical; }

  /* Vocab & Synonym & Wrong Book lists */
  .list-item {
    padding: 10px 12px;
    background: #fafafa;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .list-item h4 { margin: 0 0 4px; font-size: 14px; }
  .list-item .meta { color: #888; font-size: 12px; }
  .list-item .actions { margin-top: 6px; display: flex; gap: 6px; }
  .list-item .actions button {
    background: #fff; border: 1px solid #ddd;
    padding: 3px 10px; border-radius: 5px; font-size: 12px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .chip {
    background: #eef4ff; color: #1a4fd6; padding: 2px 8px; border-radius: 999px; font-size: 12px;
  }
  .syn-group-card {
    background: #fafafa; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
  }
  .syn-group-card h4 { margin: 0 0 4px; font-size: 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .syn-group-card .chips .chip { background: #fff; color: #333; border: 1px solid #e0e0e0; }
  .syn-group-card .actions { margin-top: 6px; display: flex; gap: 6px; }
  .syn-group-card .actions button {
    background: #fff; border: 1px solid #ddd;
    padding: 3px 10px; border-radius: 5px; font-size: 12px;
    cursor: pointer;
  }
  .syn-group-card .actions button:hover { background: #f2f2f2; }

  .toast {
    position: fixed;

<script>
/* =========================================================
 *  STATE + STORAGE
 * ========================================================= */
const STORE_KEY  = "eng_dashboard_v2";          // 主数据（不要改）
const BACKUP_KEY = "eng_dashboard_v2_backup";   // 保命副本，写主数据成功后同步一份
const META_KEY   = "eng_dashboard_meta";        // 元信息：上次导出时间、Gist 配置等
const CURRENT_SCHEMA = 5;                        // 数据结构版本号，改动结构时升级它并在 migrate() 里处理

/* ---- Ebbinghaus SRS 间隔（毫秒） ----
 *   box 0 → 立即（今天首学）
 *   box 1 → 1 天
 *   box 2 → 2 天
 *   box 3 → 4 天
 *   box 4 → 7 天
 *   box 5 → 15 天
 *   box 6 → 30 天
 */
const SRS_INTERVALS_DAY = [0, 1, 2, 4, 7, 15, 30];
function srsIntervalMs(box) {
  const d = SRS_INTERVALS_DAY[Math.min(Math.max(box, 0), SRS_INTERVALS_DAY.length - 1)];
  return d * 86400000;
}
function ensureSrs(obj) {
  if (typeof obj.srsBox !== "number") obj.srsBox = 0;
  if (typeof obj.srsNext !== "number") obj.srsNext = Date.now();
  if (typeof obj.srsReviews !== "number") obj.srsReviews = 0;
  if (typeof obj.srsLapses !== "number") obj.srsLapses = 0;
}
function srsGrade(obj, result) {
  ensureSrs(obj);
  if (result === "again") {
    obj.srsBox = 0;
    obj.srsLapses = (obj.srsLapses || 0) + 1;
  } else if (result === "hard") {
    obj.srsBox = Math.max(0, obj.srsBox);   // 不动 box，只推迟一天
  } else if (result === "good") {
    obj.srsBox = Math.min(SRS_INTERVALS_DAY.length - 1, obj.srsBox + 1);
  } else if (result === "easy") {
    obj.srsBox = Math.min(SRS_INTERVALS_DAY.length - 1, obj.srsBox + 2);
  }
  obj.srsReviews = (obj.srsReviews || 0) + 1;
  obj.srsNext = Date.now() + Math.max(srsIntervalMs(obj.srsBox), result === "hard" ? 86400000 : 0);
}
function srsDueList(items) {
  const now = Date.now();
  return items.filter(x => {
    ensureSrs(x);
    return x.srsNext <= now;
  });
}

let state = {
  version: "2.0",
  schemaVersion: CURRENT_SCHEMA,
  passages: [],              // { id, customName, title, content }
  quizSets: [],              // { id, passageId, name, createdAt } —— 每个板块下的"套题"
  grammarQuestions: [],      // { id, passageId, quizSetId, question, options[], answer, explanation }
  vocabularyQuestions: [],   // { id, passageId, quizSetId, synonymGroup, question, options[], answer, explanation }
  vocabularyBook: [],        // { word, meaning, example, synonyms[], notes, addedAt }
  synonymLibrary: [],        // { groupName, words[], notes }
  highlights: [],            // { id, passageId, selectedText, highlightColor, note, timestamp }
  wrongBook: [],             // { id, qType, qId, passageId, quizSetId, question, correctAnswer, yourAnswer, explanation, ts }
  answerLog: {},             // { [qId]: { correct: bool, chosen: string, ts } }
  currentPassageId: null,
  currentQuizSetId: {},      // { [passageId]: quizSetId } —— 每个板块最近激活的单套（兼容旧版）
  activeQuizSetIds: {},      // { [passageId]: [qsId, ...] } —— 每个板块激活的多套题（新版）
  activeTab: "grammar",      // "grammar" | "vocab"
  activeQIndex: { grammar: {}, vocab: {} },   // per passageId -> index
};

let meta = {
  lastExportTs: 0,        // 最近一次「导出 JSON」时间
  lastBackupTs: 0,        // 最近一次自动备份时间
  gist: { token: "", gistId: "", filename: "dashboard.json", lastSyncTs: 0 }
};

/* ---- 数据结构自动迁移（用户升级 HTML 后无痛平滑）---- */
function migrate(parsed) {
  const v = parsed.schemaVersion || 1;
  if (v < 5) {
    // v4 -> v5：给生词本和同义词库补 SRS 字段
    (Array.isArray(parsed.vocabularyBook) ? parsed.vocabularyBook : []).forEach(w => {
      if (typeof w.srsBox !== "number") w.srsBox = 0;
      if (typeof w.srsNext !== "number") w.srsNext = Date.now();
      if (typeof w.srsReviews !== "number") w.srsReviews = 0;
      if (typeof w.srsLapses !== "number") w.srsLapses = 0;
    });
    (Array.isArray(parsed.synonymLibrary) ? parsed.synonymLibrary : []).forEach(g => {
      if (typeof g.srsBox !== "number") g.srsBox = 0;
      if (typeof g.srsNext !== "number") g.srsNext = Date.now();
      if (typeof g.srsReviews !== "number") g.srsReviews = 0;
      if (typeof g.srsLapses !== "number") g.srsLapses = 0;
    });
  }
  // v1 -> v2: 早期无 wrongBook / highlights 等字段（已在 load 兜底）
  // v2 -> v3: 保留占位
  // v3 -> v4: 新增 quizSets 层级。给每个板块建一个"默认套题"，把原有题目归入其中。
  if (v < 4) {
    parsed.quizSets = Array.isArray(parsed.quizSets) ? parsed.quizSets : [];
    parsed.currentQuizSetId = parsed.currentQuizSetId || {};
    const passages = Array.isArray(parsed.passages) ? parsed.passages : [];
    const defaultSetByPassage = {};
    passages.forEach(p => {
      if (!p.id) return;
      // 是否已有套题？
      const existing = parsed.quizSets.find(qs => qs.passageId === p.id);
      if (existing) { defaultSetByPassage[p.id] = existing.id; return; }
      const setId = "qs_" + p.id + "_default";
      parsed.quizSets.push({
        id: setId, passageId: p.id, name: "套题 1", createdAt: Date.now()
      });
      defaultSetByPassage[p.id] = setId;
    });
    ["grammarQuestions","vocabularyQuestions"].forEach(k => {
      const arr = Array.isArray(parsed[k]) ? parsed[k] : [];
      arr.forEach(q => {
        if (!q.quizSetId) q.quizSetId = defaultSetByPassage[q.passageId] || null;
      });
    });
    // wrongBook 也补 quizSetId（尽力）
    const qMap = {};
    (parsed.grammarQuestions||[]).forEach(q => qMap[q.id] = q);
    (parsed.vocabularyQuestions||[]).forEach(q => qMap[q.id] = q);
    (parsed.wrongBook||[]).forEach(w => {
      if (!w.quizSetId) w.quizSetId = qMap[w.qId]?.quizSetId || defaultSetByPassage[w.passageId] || null;
    });
  }
  parsed.schemaVersion = CURRENT_SCHEMA;
  return parsed;
}

function save() {
  try {
    const json = JSON.stringify(state);
    localStorage.setItem(STORE_KEY, json);
    // 自动备份到副本 key（防止某次代码 bug 写坏主数据）
    try {
      localStorage.setItem(BACKUP_KEY, json);
      meta.lastBackupTs = Date.now();
      saveMeta();
    } catch(_) {}
  } catch(e) {
    console.error("Save failed", e);
    toast("保存失败：" + e.message);
  }
}
function saveMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch(_) {}
}
function loadMeta() {
  try {
    const raw = localStorage.getItem(META_KEY);
    if (raw) meta = Object.assign(meta, JSON.parse(raw));
    meta.gist = Object.assign({ token:"", gistId:"", filename:"dashboard.json", lastSyncTs:0 }, meta.gist || {});
  } catch(_) {}
}

function load() {
  try {
    let raw = localStorage.getItem(STORE_KEY);
    let source = "main";
    // 主数据坏了 / 空了但备份存在 → 从备份恢复
    if (!raw) {
      const bak = localStorage.getItem(BACKUP_KEY);
      if (bak) { raw = bak; source = "backup"; }
    } else {
      // 尝试解析主数据；解析失败降级到备份
      try { JSON.parse(raw); }
      catch(_) {
        const bak = localStorage.getItem(BACKUP_KEY);
        if (bak) { raw = bak; source = "backup"; }
      }
    }
    if (raw) {
      let parsed = JSON.parse(raw);
      parsed = migrate(parsed);
      state = Object.assign(state, parsed);
      // fill defaults for missing keys（老版本导入的兜底）
      state.activeQIndex = state.activeQIndex || { grammar: {}, vocab: {} };
      state.activeQIndex.grammar = state.activeQIndex.grammar || {};
      state.activeQIndex.vocab = state.activeQIndex.vocab || {};
      state.answerLog = state.answerLog || {};
      state.wrongBook = state.wrongBook || [];
      state.highlights = state.highlights || [];
      state.vocabularyBook = state.vocabularyBook || [];
      state.synonymLibrary = state.synonymLibrary || [];
      state.quizSets = state.quizSets || [];
      state.currentQuizSetId = state.currentQuizSetId || {};
      state.activeQuizSetIds = state.activeQuizSetIds || {};
      if (source === "backup") {
        setTimeout(() => toast("⚠️ 主数据异常，已自动从备份恢复"), 500);
      }
    }
  } catch(e) { console.error("Load failed", e); }
}

function uid(prefix="id") {
  return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7);
}
function toast(msg, ms=1800) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> t.classList.remove("show"), ms);
}

/* =========================================================
 *  SECTIONS (Custom passages)
 * ========================================================= */
function ensureCustomName(p, idx) {
  if (!p.customName || !p.customName.trim()) {
    if (p.title && p.title.trim()) p.customName = p.title.trim();
    else p.customName = "未命名板块 " + (idx + 1);
  }
  return p;
}
function normalizePassages() {
  state.passages.forEach((p, i) => {
    if (!p.id) p.id = uid("sec");
    ensureCustomName(p, i);
  });
}

function renderSectionPills() {
  const el = document.getElementById("sectionPills");
  el.innerHTML = "";
  state.passages.forEach((p, idx) => {
    const pill = document.createElement("div");
    pill.className = "pill" + (p.id === state.currentPassageId ? " active" : "");
    pill.title = p.customName;
    const nameSpan = document.createElement("span");
    nameSpan.className = "pill-name";
    nameSpan.textContent = p.customName;
    nameSpan.onclick = () => switchSection(p.id);
    pill.appendChild(nameSpan);

    const editBtn = document.createElement("span");
    editBtn.className = "pill-act";
    editBtn.textContent = "✎";
    editBtn.title = "编辑名称";
    editBtn.onclick = (e) => { e.stopPropagation(); renamePassage(p.id); };
    pill.appendChild(editBtn);

    const delBtn = document.createElement("span");
    delBtn.className = "pill-act";
    delBtn.textContent = "×";
    delBtn.title = "删除板块";
    delBtn.onclick = (e) => { e.stopPropagation(); deletePassage(p.id); };
    pill.appendChild(delBtn);

    el.appendChild(pill);
  });
  const addBtn = document.createElement("div");
  addBtn.className = "pill add";
  addBtn.textContent = "+ 新增板块";
  addBtn.onclick = addPassage;
  el.appendChild(addBtn);
}

function switchSection(id) {
  state.currentPassageId = id;
  save();
  renderAll();
}
function addPassage() {
  const name = prompt("请输入板块名称");
  if (!name || !name.trim()) return;
  const p = { id: uid("sec"), customName: name.trim(), title: "", content: "" };
  state.passages.push(p);
  state.currentPassageId = p.id;
  save();
  renderAll();
}
function renamePassage(id) {
  const p = state.passages.find(x => x.id === id);
  if (!p) return;
  const name = prompt("修改板块名称", p.customName);
  if (name === null) return;
  if (!name.trim()) { toast("名称不能为空"); return; }
  p.customName = name.trim();
  save();
  renderAll();
}
function deletePassage(id) {
  const p = state.passages.find(x => x.id === id);
  if (!p) return;
  const ok = confirm(
    "确认删除该学习板块吗？\n" +
    "该操作会删除此板块下的阅读文本、题目、高亮、笔记、阅读位置和相关做题记录。\n\n" +
    "板块：" + p.customName
  );
  if (!ok) return;
  const grammarIds = state.grammarQuestions.filter(q => q.passageId === id).map(q => q.id);
  const vocabIds = state.vocabularyQuestions.filter(q => q.passageId === id).map(q => q.id);
  const removedQIds = new Set([...grammarIds, ...vocabIds]);

  state.grammarQuestions = state.grammarQuestions.filter(q => q.passageId !== id);
  state.vocabularyQuestions = state.vocabularyQuestions.filter(q => q.passageId !== id);
  state.highlights = state.highlights.filter(h => h.passageId !== id);
  state.wrongBook = state.wrongBook.filter(w => w.passageId !== id && !removedQIds.has(w.qId));
  state.quizSets = state.quizSets.filter(qs => qs.passageId !== id);
  delete state.currentQuizSetId[id];
  Object.keys(state.answerLog).forEach(k => { if (removedQIds.has(k)) delete state.answerLog[k]; });
  delete state.activeQIndex.grammar[id];
  delete state.activeQIndex.vocab[id];

  const idx = state.passages.findIndex(x => x.id === id);
  state.passages.splice(idx, 1);
  if (state.passages.length) {
    const nextIdx = Math.max(0, Math.min(idx, state.passages.length - 1));
    state.currentPassageId = state.passages[nextIdx].id;
  } else {
    state.currentPassageId = null;
  }
  save();
  renderAll();
}

function currentPassage() {
  return state.passages.find(p => p.id === state.currentPassageId) || null;
}

/* =========================================================
 *  READING (highlighting + word click)
 * ========================================================= */

// Rebuild reading area from base content + current highlights + replacement overlays
let replacementMap = {};   // wordText -> replacementText for CURRENT VIEW only (not persisted)

function renderReading() {
  const wrap = document.getElementById("readingWrap");
  wrap.innerHTML = "";
  const p = currentPassage();
  if (!p) {
    wrap.innerHTML = `<div class="empty">
      暂无学习板块，请新增板块或导入 JSON。
    </div>`;
    return;
  }
  const titleEl = document.createElement("h1");
  titleEl.className = "reading-title";
  titleEl.textContent = p.title || p.customName;
  wrap.appendChild(titleEl);
  const subEl = document.createElement("div");
  subEl.className = "reading-sub";
  subEl.textContent = "板块：" + p.customName + " · 双击标题可编辑内容";
  wrap.appendChild(subEl);
  titleEl.addEventListener("dblclick", () => openPassageEditor());
  subEl.addEventListener("dblclick", () => openPassageEditor());

  const body = document.createElement("div");
  body.className = "reading-body";
  body.id = "readingBody";
  if (!p.content || !p.content.trim()) {
    body.innerHTML = `<div class="empty">
      当前板块暂无阅读文本<br/>可通过导入 JSON 或双击标题添加内容
    </div>`;
    wrap.appendChild(body);
    return;
  }
  // Render as tokens (words + spaces + punctuation)
  const tokens = tokenize(p.content);
  const hls = state.highlights.filter(h => h.passageId === p.id);

  // Build char-index-based highlight map
  // We'll walk through the content string, producing spans.
  const html = buildReadingHTML(p.content, hls);
  body.innerHTML = html;
  wrap.appendChild(body);

  // Bind click for word tokens
  body.querySelectorAll(".word").forEach(w => {
    w.addEventListener("click", (e) => {
      // If user made a selection, ignore
      const sel = window.getSelection();
      if (sel && sel.toString().trim().length > 1) return;
      showWordPopup(w, e);
    });
  });
  // Bind click for existing highlights (view/edit note)
  body.querySelectorAll(".hl").forEach(h => {
    h.addEventListener("click", (e) => {
      e.stopPropagation();
      const hid = h.dataset.hid;
      openHighlightEditor(hid);
    });
  });
}

// Tokenize content into word / non-word chunks, escaping HTML
function tokenize(text) {
  const re = /[A-Za-z]+(?:[''][A-Za-z]+)?|\s+|[^A-Za-z\s]+/g;
  const out = [];
  let m;
  while ((m = re.exec(text)) !== null) {
    out.push(m[0]);
  }
  return out;
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// Build reading HTML that:
//  - marks each word token as span.word (clickable, replaceable via replacementMap)
//  - wraps highlight ranges (based on start offset in original content)
// Approach: we produce token spans; then wrap contiguous token ranges that fall in a highlight
function buildReadingHTML(content, hls) {
  // pre-compute token boundaries
  const tokens = [];
  const re = /[A-Za-z]+(?:[''][A-Za-z]+)?|\s+|[^A-Za-z\s]+/g;
  let m;
  while ((m = re.exec(content)) !== null) {
    tokens.push({ text: m[0], start: m.index, end: m.index + m[0].length });
  }
  // For each token, produce a span (word) or plain text
  // then check highlights: a highlight covers chars [start,end]. Wrap containing tokens.
  const parts = tokens.map(t => {
    const isWord = /^[A-Za-z]/.test(t.text);
    if (isWord) {
      const key = t.text.toLowerCase();
      const replaced = replacementMap[key];
      const displayText = replaced || t.text;
      return {
        html: `<span class="word${replaced?' replaced':''}" data-word="${esc(t.text)}" data-start="${t.start}" data-end="${t.end}">${esc(displayText)}</span>`,
        start: t.start, end: t.end
      };
    }
    // whitespace preserved (pre-wrap is on)
    return { html: esc(t.text), start: t.start, end: t.end };
  });

  // We need to insert highlight open/close around contiguous parts covered by each highlight range.
  // Approach: walk parts; for each part, determine which highlights it belongs to; open/close as needed.
  // For simplicity, wrap each part individually if inside highlight.
  let html = "";
  for (const part of parts) {
    // find first matching highlight (if overlapping multiple, take first)
    const activeH = hls.find(h => {
      const s = h.charStart ?? -1;
      const e = h.charEnd ?? -1;
      return s >= 0 && e >= 0 && part.start >= s && part.end <= e;
    });
    if (activeH) {
      const cls = "hl hl-" + (activeH.highlightColor || "yellow") + (activeH.note ? " has-note" : "");
      html += `<span class="${cls}" data-hid="${esc(activeH.id)}">${part.html}</span>`;
    } else {
      html += part.html;
    }
  }
  return html;
}

/* --- SELECTION MENU --- */
document.getElementById("paneLeft").addEventListener("mouseup", handleSelection);
document.getElementById("paneLeft").addEventListener("touchend", () => setTimeout(handleSelection, 50));

function handleSelection() {
  const sel = window.getSelection();
  const menu = document.getElementById("selMenu");
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) {
    menu.style.display = "none";
    return;
  }
  const text = sel.toString();
  if (!text.trim()) { menu.style.display = "none"; return; }
  // Compute selection bounding rect
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  if (rect.width === 0 && rect.height === 0) { menu.style.display = "none"; return; }
  // Position menu
  menu.style.display = "flex";
  const menuW = menu.offsetWidth || 300;
  let left = rect.left + rect.width/2 - menuW/2 + window.scrollX;
  let top = rect.top - menu.offsetHeight - 8 + window.scrollY;
  if (top < 8) top = rect.bottom + 8 + window.scrollY;
  left = Math.max(8, Math.min(left, window.innerWidth - menuW - 8));
  menu.style.left = left + "px";
  menu.style.top = top + "px";
  // Store selection info
  menu._selInfo = getSelectionOffsetInReading(range);
  menu._selText = text;
}
document.addEventListener("mousedown", (e) => {
  const menu = document.getElementById("selMenu");
  if (menu.style.display !== "none" && !menu.contains(e.target)) {
    // let mouseup handle new selection
    if (!e.target.closest("#readingBody")) menu.style.display = "none";
  }
  const wp = document.getElementById("wordPop");
  if (wp.style.display !== "none" && !wp.contains(e.target) && !e.target.classList.contains("word")) {
    wp.style.display = "none";
  }
});

function getSelectionOffsetInReading(range) {
  const body = document.getElementById("readingBody");
  if (!body) return null;
  // Walk children; find start offset relative to full content by summing textContent lengths
  // But highlights wrap tokens with data-start/data-end. We'll use those where possible.
  // Simpler: find nearest ancestor with data-start on start and end containers.
  function findOffset(node, isStart, offsetInNode) {
    // If node is text, climb up to find enclosing token span (data-start)
    let el = node.nodeType === 1 ? node : node.parentElement;
    while (el && el !== body && !el.dataset?.start) el = el.parentElement;
    if (el && el.dataset && el.dataset.start != null) {
      const s = parseInt(el.dataset.start, 10);
      const e = parseInt(el.dataset.end, 10);
      const textLen = el.textContent.length;
      // offset within the element text
      let off = 0;
      if (node.nodeType === 3) {
        // approximate by pre-order walk from el
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        let cur;
        while ((cur = walker.nextNode())) {
          if (cur === node) { off += offsetInNode; break; }
          off += cur.nodeValue.length;
        }
      } else {
        off = 0;
      }
      // If replaced text, we still can't precisely map; fallback to bounds
      const contentLenSame = (e - s) === textLen;
      const mapped = contentLenSame ? (s + off) : (isStart ? s : e);
      return mapped;
    }
    return null;
  }
  const startOff = findOffset(range.startContainer, true, range.startOffset);
  const endOff = findOffset(range.endContainer, false, range.endOffset);
  if (startOff == null || endOff == null) return null;
  return { start: Math.min(startOff, endOff), end: Math.max(startOff, endOff) };
}

document.getElementById("selMenu").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  const menu = document.getElementById("selMenu");
  const info = menu._selInfo;
  const text = menu._selText;
  if (!info || !text) { menu.style.display = "none"; return; }
  const p = currentPassage();
  if (!p) return;
  if (btn.dataset.color) {
    addHighlight(p.id, info.start, info.end, text, btn.dataset.color, "");
  } else if (btn.dataset.act === "note") {
    const note = prompt("笔记内容：", "");
    if (note !== null) {
      addHighlight(p.id, info.start, info.end, text, "yellow", note.trim());
    }
  } else if (btn.dataset.act === "vocab") {
    addToVocabBook(text.trim());
  }
  menu.style.display = "none";
  window.getSelection().removeAllRanges();
});

function addHighlight(passageId, start, end, text, color, note) {
  const h = {
    id: uid("hl"),
    passageId,
    charStart: start,
    charEnd: end,
    selectedText: text,
    highlightColor: color,
    note: note || "",
    timestamp: Date.now(),
  };
  state.highlights.push(h);
  save();
  renderReading();
}

/* --- WORD CLICK POPUP (synonyms replacement) --- */
function showWordPopup(wordEl, evt) {
  const word = wordEl.dataset.word;
  const wl = word.toLowerCase();
  const pop = document.getElementById("wordPop");
  // find synonym groups containing this word
  const groups = state.synonymLibrary.filter(g =>
    (g.words || []).some(w => w.toLowerCase() === wl)
  );
  const inVocab = state.vocabularyBook.find(v => v.word.toLowerCase() === wl);
  let html = `<h4>${esc(word)}</h4>`;
  if (groups.length) {
    for (const g of groups) {
      const others = g.words.filter(w => w.toLowerCase() !== wl);
      html += `<div style="margin-bottom:6px"><div style="font-size:11px;color:#888;margin-bottom:4px">${esc(g.groupName || 'Synonyms')}</div>`;
      html += `<div class="syn-list">`;
      for (const s of others) {
        html += `<span class="syn-chip" data-replace="${esc(s)}">${esc(s)}</span>`;
      }
      html += `</div></div>`;
    }
  } else {
    html += `<div style="font-size:12px;color:#888;margin-bottom:6px">暂无同义词组。可在"同义词库"中添加此单词。</div>`;
  }
  html += `<div class="pop-actions">
    <button data-act="reset">还原</button>
    <button data-act="addVocab">${inVocab ? '生词本已有' : '+ 加入生词本'}</button>
    <button data-act="addSyn">+ 同义词组</button>
  </div>`;
  pop.innerHTML = html;
  pop.style.display = "block";
  // position
  const rect = wordEl.getBoundingClientRect();
  const paneLeft = document.getElementById("paneLeft");
  const paneRect = paneLeft.getBoundingClientRect();
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 6;
  const popW = pop.offsetWidth;
  left = Math.min(left, window.innerWidth - popW - 12);
  pop.style.left = left + "px";
  pop.style.top = top + "px";

  pop.querySelectorAll("[data-replace]").forEach(el => {
    el.onclick = () => {
      replacementMap[wl] = el.dataset.replace;
      pop.style.display = "none";
      renderReading();
      toast("已替换为 " + el.dataset.replace + "（刷新可还原）");
    };
  });
  pop.querySelector("[data-act='reset']").onclick = () => {
    delete replacementMap[wl];
    pop.style.display = "none";
    renderReading();
  };
  pop.querySelector("[data-act='addVocab']").onclick = () => {
    addToVocabBook(word);
    pop.style.display = "none";
  };
  pop.querySelector("[data-act='addSyn']").onclick = () => {
    pop.style.display = "none";
    openSynonymEditor(null, word);
  };
}

function addToVocabBook(word, extra = {}) {
  word = (word || "").trim();
  if (!word) return false;
  const exists = state.vocabularyBook.find(v => v.word.toLowerCase() === word.toLowerCase());
  if (exists) {
    // 已存在：追加同义词/例句/笔记（如果有 extra）
    let updated = false;
    if (extra.synonyms && extra.synonyms.length) {
      const set = new Set((exists.synonyms || []).map(s => s.toLowerCase()));
      extra.synonyms.forEach(s => { if (!set.has(s.toLowerCase())) { (exists.synonyms = exists.synonyms || []).push(s); set.add(s.toLowerCase()); updated = true; } });
    }
    if (extra.example && !exists.example) { exists.example = extra.example; updated = true; }
    if (extra.meaning && !exists.meaning) { exists.meaning = extra.meaning; updated = true; }
    save();
    toast(updated ? "已更新生词：" + word : "生词本已存在：" + word);
    return false;
  }
  state.vocabularyBook.push({
    word,
    meaning: extra.meaning || "",
    example: extra.example || "",
    synonyms: extra.synonyms || [],
    notes: extra.notes || "",
    addedAt: Date.now(),
    // Ebbinghaus SRS 字段
    srsBox: 0,               // 0..6，代表复习级别
    srsNext: Date.now(),     // 下次到期时间
    srsReviews: 0,
    srsLapses: 0,
  });
  save();
  renderStats();
  toast("已加入生词本：" + word);
  return true;
}

/* ---- 题目内选中文本的浮动菜单 ----
 * 在题目区选中任何词/词组 → 浮出 [加生词] [加同义词组]，一键收纳
 */
let qSelMenu = null;
function ensureQSelMenu() {
  if (qSelMenu) return qSelMenu;
  qSelMenu = document.createElement("div");
  qSelMenu.className = "sel-menu";
  qSelMenu.style.display = "none";
  qSelMenu.innerHTML = `
    <button data-a="vocab" title="加入生词本">Vocab</button>
    <button data-a="syn" title="加入同义词库">Synonym</button>
    <button data-a="copy" title="复制文字">Copy</button>
  `;
  document.body.appendChild(qSelMenu);
  return qSelMenu;
}
function showQuestionSelectionMenu(text, rect, q) {
  const menu = ensureQSelMenu();
  menu.style.display = "flex";
  const w = menu.offsetWidth || 240;
  let left = rect.left + rect.width/2 - w/2 + window.scrollX;
  let top = rect.top - menu.offsetHeight - 8 + window.scrollY;
  if (top < 8) top = rect.bottom + 8 + window.scrollY;
  left = Math.max(8, Math.min(left, window.innerWidth - w - 8));
  menu.style.left = left + "px";
  menu.style.top  = top + "px";
  menu.querySelector("[data-a='vocab']").onclick = () => {
    hideQSelMenu();
    openAddVocabDialog(q, text);
  };
  menu.querySelector("[data-a='syn']").onclick = () => {
    hideQSelMenu();
    openAddSynonymDialog(q, text);
  };
  menu.querySelector("[data-a='copy']").onclick = async () => {
    try { await navigator.clipboard.writeText(text); toast("已复制"); }
    catch(_) { toast("复制失败"); }
    hideQSelMenu();
    window.getSelection && window.getSelection().removeAllRanges();
  };
}
function hideQSelMenu() { if (qSelMenu) qSelMenu.style.display = "none"; }
document.addEventListener("mousedown", (e) => {
  if (qSelMenu && qSelMenu.style.display !== "none" && !qSelMenu.contains(e.target)) hideQSelMenu();
});
function bindQuestionSelectionCapture(cardEl, q) {
  const handler = () => setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) { hideQSelMenu(); return; }
    const text = sel.toString().trim();
    if (!text || text.length > 100) { hideQSelMenu(); return; }
    const range = sel.getRangeAt(0);
    if (!cardEl.contains(range.commonAncestorContainer)) { hideQSelMenu(); return; }
    const rect = range.getBoundingClientRect();
    if (rect.width === 0 && rect.height === 0) { hideQSelMenu(); return; }
    showQuestionSelectionMenu(text, rect, q);
  }, 10);
  cardEl.addEventListener("mouseup", handler);
  cardEl.addEventListener("touchend", handler);
}

/* ---- 题目卡片里的"加生词" / "加同义词组" 快捷入口 ---- */
function openAddVocabDialog(q, prefill) {
  const selText = (prefill || (window.getSelection && window.getSelection().toString()) || "").trim();
  openModal({
    title: "⭐ 加入生词本",
    body: `
      <div class="form-row"><label>单词 / 词组（支持中英文短语，如 "give up" / "close the gap"）</label>
        <input id="vwIn" value="${esc(selText)}" placeholder="可先在题干或选项里选中一个词/词组再点按钮"/></div>
      <div class="form-row"><label>中文释义（可选）</label>
        <input id="vmIn" placeholder="例如：放弃"/></div>
      <div class="form-row"><label>例句（可选，默认用当前题干）</label>
        <textarea id="veIn" placeholder="留空则用当前题干作为例句">${esc(q.question || "")}</textarea></div>
      <div class="form-row"><label>同义词（逗号分隔，可选）</label>
        <input id="vsIn" placeholder="give up, quit"/></div>
    `,
    buttons: [
      { text: "取消", onclick: closeModal },
      { text: "保存", cls: "primary", onclick: () => {
        const word = document.getElementById("vwIn").value.trim();
        if (!word) { toast("请填写单词"); return; }
        addToVocabBook(word, {
          meaning: document.getElementById("vmIn").value.trim(),
          example: document.getElementById("veIn").value.trim(),
          synonyms: document.getElementById("vsIn").value.split(",").map(s => s.trim()).filter(Boolean),
        });
        closeModal();
      }}
    ]
  });
}

function openAddSynonymDialog(q, prefill) {
  // 从题目选项里剥离 A. B. 前缀，作为默认候选词组
  const cleanOpts = (q.options || []).map(o => o.replace(/^[A-Z][.\s、)]\s*/, "").trim()).filter(Boolean);
  // 若用户传了预填内容（比如选中的一个词组），加进候选头部
  let defaults = cleanOpts.slice();
  if (prefill && prefill.trim()) {
    const t = prefill.trim();
    if (!defaults.some(x => x.toLowerCase() === t.toLowerCase())) defaults.unshift(t);
  }
  const defaultWords = defaults.join(", ");
  const defaultName = q.synonymGroup || "";
  openModal({
    title: "🧩 加入同义词库",
    body: `
      <div class="form-row"><label>分组名</label>
        <input id="sgnIn" value="${esc(defaultName)}" placeholder="例如：Gap Group"/></div>
      <div class="form-row"><label>成员（逗号或换行分隔）</label>
        <textarea id="sgwIn" style="min-height:80px">${esc(defaultWords)}</textarea></div>
      <div class="form-row"><label>备注（可选，默认用题目解析）</label>
        <textarea id="sgnnIn">${esc(q.explanation || "")}</textarea></div>
      <div style="font-size:12px;color:#888;margin-top:6px">
        💡 同时会把这些词加入生词本（自动去重）。
      </div>
    `,
    buttons: [
      { text: "取消", onclick: closeModal },
      { text: "保存", cls: "primary", onclick: () => {
        const name = document.getElementById("sgnIn").value.trim();
        const words = document.getElementById("sgwIn").value.split(/[,\n]/).map(s => s.trim()).filter(Boolean);
        const notes = document.getElementById("sgnnIn").value.trim();
        if (!name) { toast("请填写分组名"); return; }
        if (words.length < 2) { toast("至少两个词"); return; }
        // 同义词库
        const exists = state.synonymLibrary.find(g => g.groupName === name);
        if (exists) {
          const set = new Set((exists.words || []).map(w => w.toLowerCase()));
          words.forEach(w => { if (!set.has(w.toLowerCase())) { exists.words.push(w); set.add(w.toLowerCase()); } });
          if (notes && !exists.notes) exists.notes = notes;
        } else {
          state.synonymLibrary.push({ groupName: name, words, notes });
        }
        // 同步加入生词本（不覆盖已有）
        words.forEach(w => addToVocabBook(w, { example: q.question || "", synonyms: words.filter(x => x.toLowerCase() !== w.toLowerCase()) }));
        save();
        renderStats();
        toast("已保存到同义词库 + 生词本");
        closeModal();
      }}
    ]
  });
}

 *  QUESTIONS (Grammar / Vocabulary)
 * ========================================================= */
function renderRightPane() {
  document.querySelectorAll(".right-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === state.activeTab);
  });
  const body = document.getElementById("rightBody");
  body.innerHTML = "";
  const p = currentPassage();
  if (!p) {
    body.innerHTML = `<div class="empty">暂无学习板块<br/>新增或导入板块以显示题目</div>`;
    return;
  }
  const activeIds = getActiveQuizSetIds();
  const activeSet = new Set(activeIds);
  const qsMap = {};
  state.quizSets.forEach(qs => qsMap[qs.id] = qs);
  const isGrammar = state.activeTab === "grammar";
  const pool = isGrammar
    ? state.grammarQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId))
    : state.vocabularyQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId));

  const labelSets = activeIds.length === 1
    ? esc(qsMap[activeIds[0]]?.name || '默认')
    : `已选 ${activeIds.length} 套`;
  const bar = document.createElement("div");
  bar.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;";
  bar.innerHTML = `<div style="font-size:12px;color:#888">当前套题：<b style="color:#333">${labelSets}</b> · 共 ${pool.length} 题</div>`;
  const addBtn = document.createElement("button");
  addBtn.className = "tb-btn";
  addBtn.textContent = "+ 添加题目";
  addBtn.onclick = () => openQuestionEditor(null, isGrammar ? "grammar" : "vocab");
  bar.appendChild(addBtn);
  body.appendChild(bar);

  if (pool.length === 0) {
    const emp = document.createElement("div");
    emp.className = "empty";
    emp.innerHTML = "当前选中的套题暂无题目<br/>点右上「+ 添加题目」新增，或用「🐈 设置 → 合并导入」批量导入";
    body.appendChild(emp);
    return;
  }

  // 多套题时按套题分组显示
  if (activeIds.length > 1) {
    const groups = {};
    pool.forEach(q => { (groups[q.quizSetId] = groups[q.quizSetId] || []).push(q); });
    activeIds.forEach(qsId => {
      const qs = qsMap[qsId];
      const list = groups[qsId] || [];
      if (!list.length) return;
      const h = document.createElement("div");
      h.style.cssText = "font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid #eee";
      h.textContent = `${qs?.name || '套题'} · ${list.length} 题`;
      body.appendChild(h);
      list.forEach((q, i) => body.appendChild(renderQuestionCard(q, i + 1, isGrammar ? "grammar" : "vocab")));
    });
  } else {
    pool.forEach((q, i) => body.appendChild(renderQuestionCard(q, i + 1, isGrammar ? "grammar" : "vocab")));
  }
}

function renderQuestionCard(q, num, qType) {
  const log = state.answerLog[q.id];
  const card = document.createElement("div");
  card.className = "q-card selectable-card";
  card.dataset.qid = q.id;

  const meta = document.createElement("div");
  meta.className = "q-meta";
  meta.textContent = `Q${num} · ${qType.toUpperCase()}${q.synonymGroup ? " · " + q.synonymGroup : ""}`;
  card.appendChild(meta);

  // 快捷"选词工具"按钮
  const quickBar = document.createElement("div");
  quickBar.style.cssText = "display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap";
  const addWordBtn = document.createElement("button");
  addWordBtn.className = "q-tool-btn";
  addWordBtn.innerHTML = "⭐ 加生词";
  addWordBtn.title = "输入 / 选中一个单词加入生词本";
  addWordBtn.onclick = () => openAddVocabDialog(q);
  quickBar.appendChild(addWordBtn);
  const addSynBtn = document.createElement("button");
  addSynBtn.className = "q-tool-btn";
  addSynBtn.innerHTML = "🧩 加同义词组";
  addSynBtn.title = "把本题选项/词组一键加入同义词库";
  addSynBtn.onclick = () => openAddSynonymDialog(q);
  quickBar.appendChild(addSynBtn);
  card.appendChild(quickBar);

  const qt = document.createElement("div");
  qt.className = "q-text";
  qt.textContent = q.question;
  card.appendChild(qt);

  const opts = document.createElement("div");
  opts.className = "q-options";
  const chosenLetter = log?.chosen;
  q.options.forEach((opt) => {
    const letter = (opt.match(/^([A-Z])[.\s、)]/) || [])[1] || opt[0];
    const btn = document.createElement("button");
    btn.className = "q-opt";
    btn.textContent = opt;
    if (chosenLetter && chosenLetter === letter) btn.classList.add("selected");
    btn.onclick = () => {
      card.querySelectorAll(".q-opt").forEach(o => o.classList.remove("selected","correct","wrong"));
      btn.classList.add("selected");
      card._chosen = letter;
    };
    if (log) {
      // Already answered: color
      if (letter === q.answer) btn.classList.add("correct");
      else if (letter === chosenLetter) btn.classList.add("wrong");
    }
    opts.appendChild(btn);
  });
  card.appendChild(opts);

  const status = document.createElement("div");
  status.className = "q-status";
  if (log) {
    status.classList.add(log.correct ? "ok" : "err");
    status.textContent = log.correct ? "✓ Correct" : "✗ Wrong · 正确答案：" + q.answer;
  }
  card.appendChild(status);

  const explain = document.createElement("div");
  explain.className = "q-explain" + (log ? " show" : "");
  explain.textContent = q.explanation || "";
  card.appendChild(explain);

  const actions = document.createElement("div");
  actions.className = "q-actions";
  const submitBtn = document.createElement("button");
  submitBtn.className = "primary";
  submitBtn.textContent = "Submit";
  submitBtn.onclick = () => submitAnswer(q, card, qType);
  const showBtn = document.createElement("button");
  showBtn.textContent = "Show Answer";
  showBtn.onclick = () => {
    card.querySelectorAll(".q-opt").forEach(o => {
      const letter = (o.textContent.match(/^([A-Z])/) || [])[1];
      if (letter === q.answer) o.classList.add("correct");
    });
    explain.classList.add("show");
  };
  const editBtn = document.createElement("button");
  editBtn.textContent = "Edit";
  editBtn.onclick = () => openQuestionEditor(q, qType);
  const delBtn = document.createElement("button");
  delBtn.textContent = "Delete";
  delBtn.onclick = () => {
    if (!confirm("删除该题？")) return;
    if (qType === "grammar")
      state.grammarQuestions = state.grammarQuestions.filter(x => x.id !== q.id);
    else
      state.vocabularyQuestions = state.vocabularyQuestions.filter(x => x.id !== q.id);
    delete state.answerLog[q.id];
    state.wrongBook = state.wrongBook.filter(w => w.qId !== q.id);
    save(); renderRightPane(); renderStats();
  };
  actions.append(submitBtn, showBtn, editBtn, delBtn);
  card.appendChild(actions);

  // 监听选中文本 → 浮动菜单（加生词 / 加同义词组）
  bindQuestionSelectionCapture(card, q);

  return card;
}

function submitAnswer(q, card, qType) {
  const chosen = card._chosen;
  if (!chosen) { toast("请先选择一个选项"); return; }
  const correct = chosen === q.answer;
  state.answerLog[q.id] = { correct, chosen, ts: Date.now() };
  // wrong book
  if (!correct) {
    // avoid duplicates: keep latest
    state.wrongBook = state.wrongBook.filter(w => w.qId !== q.id);
    state.wrongBook.push({
      id: uid("wb"),
      qType, qId: q.id,
      passageId: q.passageId,
      quizSetId: q.quizSetId || null,
      question: q.question,
      options: q.options,
      correctAnswer: q.answer,
      yourAnswer: chosen,
      explanation: q.explanation || "",
      ts: Date.now(),
    });
  } else {
    // if now correct, optionally remove from wrong book (keep as history? we remove)
    state.wrongBook = state.wrongBook.filter(w => w.qId !== q.id);
  }
  save();
  renderRightPane();
  renderStats();
}

function openModal({ title, body, buttons, size }) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  const foot = document.getElementById("modalFoot");
  foot.innerHTML = "";
  (buttons || [{text:"关闭", onclick: closeModal}]).forEach(b => {
    const btn = document.createElement("button");
    btn.textContent = b.text;
    if (b.cls) btn.classList.add(b.cls);
    btn.onclick = b.onclick;
    foot.appendChild(btn);
  });
  const mask = document.getElementById("modalMask");
  mask.classList.toggle("full", size === "full");
  mask.classList.add("show");
}
function closeModal() {
  const mask = document.getElementById("modalMask");
  mask.classList.remove("show");
  mask.classList.remove("full");
}
document.getElementById("modalClose").onclick = closeModal;
document.getElementById("modalMask").addEventListener("click", (e) => {
  if (e.target.id === "modalMask") closeModal();
});

  const p = currentPassage();
  const cur = currentQuizSet();

    id: uid(qType === "grammar" ? "g" : "v"),

    `<div class="form-row"><label>Option ${String.fromCharCode(65+i)}</label>
      <input class="qopt" value="${esc(o)}"/></div>`

    ? `<div class="form-row"><label>Synonym Group</label>
        <input id="qSyn" value="${esc(data.synonymGroup||'')}"/></div>` : "";

        <textarea id="qExp">${esc(data.explanation||'')}</textarea></div>
    `,

      { text: "取消", onclick: closeModal },
      { text: "保存", cls: "primary", onclick: () => {
        data.question = document.getElementById("qText").value.trim();
        data.options = Array.from(document.querySelectorAll(".qopt")).map(i => i.value.trim()).filter(Boolean);
        data.answer = document.getElementById("qAns").value.trim().toUpperCase();
        data.explanation = document.getElementById("qExp").value.trim();

      <div class="form-row"><label>Word</label><input id="vw" value="${esc(v.word)}" ${word?'disabled':''}/></div>
      <div class="form-row"><label>Meaning</label><input id="vm" value="${esc(v.meaning||'')}"/></div>
      <div class="form-row"><label>Example</label><textarea id="ve">${esc(v.example||'')}</textarea></div>

      <div class="form-row"><label>Notes</label><textarea id="vn">${esc(v.notes||'')}</textarea></div>
    `,
    buttons: [
      { text: "取消", onclick: closeModal },
      { text: "保存", cls: "primary", onclick: () => {
        const wVal = (document.getElementById("vw").value || v.word || "").trim();
        if (!wVal) { toast("Word 不能为空"); return; }

/* =========================================================
 *  SRS 复习会话（艾宾浩斯记忆法）
 *  mode: "vocab" | "syn"
 * ========================================================= */
let srsSession = null;

function startSrsReview(mode, customList) {
  const source = mode === "vocab" ? state.vocabularyBook : state.synonymLibrary;
  source.forEach(ensureSrs);
  let queue;
  if (Array.isArray(customList) && customList.length) {
    customList.forEach(ensureSrs);
    queue = customList.slice();
  } else {
    const due = srsDueList(source);
    if (!due.length) {
      openModal({
        title: "🐾 复习",
        body: `<div class="empty">当前没有到期需要复习的内容 🎉<br/>下次到期时间会显示在每个词条的"下次"标签上</div>`,
        buttons: [{ text: "好的", cls: "primary", onclick: closeModal }]
      });
      return;
    }
    queue = due.slice().sort(() => Math.random() - 0.5);
  }
  srsSession = { mode, queue, total: queue.length, done: 0, showAnswer: false };
  renderSrsCard();
}

function renderSrsCard() {
  if (!srsSession || !srsSession.queue.length) {
    // 完成
    openModal({
      title: "🎉 本轮复习完成",
      body: `<div style="text-align:center;padding:20px;font-size:15px;line-height:1.9">
        本轮共复习 <b>${srsSession?.total || 0}</b> 条<br/>
        <span style="color:#888;font-size:13px">下次到期时间已自动更新</span>
      </div>`,
      buttons: [
        { text: "关闭", cls: "primary", onclick: () => { srsSession = null; closeModal(); } },
        { text: "再看看", onclick: () => { closeModal(); if (srsSession?.mode === "vocab") openVocabPanel(); else openSynonymPanel(); } }
      ]
    });
    return;
  }
  const cur = srsSession.queue[0];
  const isVocab = srsSession.mode === "vocab";
  const progress = `${srsSession.done + 1} / ${srsSession.total}`;

  // 卡片正面（词/组名） + 背面（释义/成员）
  const frontHTML = isVocab
    ? `<div style="font-size:32px;font-weight:700;line-height:1.3">${esc(cur.word)}</div>`
    : `<div style="font-size:24px;font-weight:700;line-height:1.3">${esc(cur.groupName || "Group")}</div>
       <div style="color:#888;font-size:12px;margin-top:4px">共 ${(cur.words||[]).length} 词</div>`;

  const backHTML = isVocab
    ? `
      <div style="font-size:16px;line-height:1.8;color:#111">${esc(cur.meaning || "（暂无释义）")}</div>
      ${cur.example ? `<div style="margin-top:12px;padding:10px 12px;background:#f7f7f7;border-radius:8px;font-size:13px;line-height:1.6;color:#444">${esc(cur.example)}</div>` : ""}
      ${cur.synonyms && cur.synonyms.length ? `<div class="chips" style="margin-top:12px">${cur.synonyms.map(s=>`<span class="chip">${esc(s)}</span>`).join('')}</div>` : ""}
      ${cur.notes ? `<div style="margin-top:10px;font-size:12px;color:#888">📝 ${esc(cur.notes)}</div>` : ""}
    `
    : `
      <div class="chips" style="justify-content:center">${(cur.words||[]).map(w=>`<span class="chip" style="font-size:15px;padding:6px 14px">${esc(w)}</span>`).join('')}</div>
      ${cur.notes ? `<div style="margin-top:14px;text-align:center;font-size:13px;color:#666">${esc(cur.notes)}</div>` : ""}
    `;

  openModal({
    size: "full",
    title: `🐾 复习 · ${isVocab ? "生词本" : "同义词库"}`,
    body: `
      <div style="max-width:640px;margin:0 auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px;color:#888">
          <span>进度 ${progress}</span>
          <span>Box ${cur.srsBox || 0} · 已复习 ${cur.srsReviews || 0} 次</span>
        </div>

        <div style="background:#fff;border:1px solid #eee;border-radius:14px;padding:40px 24px;box-shadow:0 2px 8px rgba(0,0,0,.04);text-align:center;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center">
          ${frontHTML}
          <div id="srsBack" style="width:100%;margin-top:22px;padding-top:22px;border-top:1px dashed #eee;${srsSession.showAnswer ? '' : 'display:none;'}">
            ${backHTML}
          </div>
        </div>

        <div id="srsBtnBar" style="margin-top:20px;text-align:center">
          ${!srsSession.showAnswer
            ? `<button class="tb-btn primary" style="padding:10px 40px;font-size:15px" id="srsShowBtn">显示答案 (Space)</button>`
            : `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
                <button class="tb-btn" data-g="again" style="padding:8px 18px;background:#ffebee;border-color:#ef9a9a;color:#b71c1c">重来 (1)</button>
                <button class="tb-btn" data-g="hard"  style="padding:8px 18px;background:#fff8e1;border-color:#ffe082;color:#6d4c00">困难 (2)</button>
                <button class="tb-btn" data-g="good"  style="padding:8px 18px;background:#e8f5e9;border-color:#a5d6a7;color:#1b5e20">良好 (3)</button>
                <button class="tb-btn" data-g="easy"  style="padding:8px 18px;background:#e3f2fd;border-color:#90caf9;color:#0d47a1">简单 (4)</button>
              </div>
              <div style="margin-top:10px;font-size:11px;color:#aaa">重来=立即再来 · 困难=1天 · 良好=按盒 · 简单=大跨度</div>`
          }
        </div>
      </div>
    `,
    buttons: [
      { text: "结束本轮", cls: "primary", onclick: () => { srsSession = null; closeModal(); } }
    ]
  });

  // 绑定
  if (!srsSession.showAnswer) {
    document.getElementById("srsShowBtn").onclick = () => { srsSession.showAnswer = true; renderSrsCard(); };
  } else {
    document.querySelectorAll("#srsBtnBar [data-g]").forEach(b => {
      b.onclick = () => srsGradeCurrent(b.dataset.g);
    });
  }
}

function srsGradeCurrent(grade) {
  if (!srsSession) return;
  const cur = srsSession.queue.shift();
  srsGrade(cur, grade);
  srsSession.done++;
  srsSession.showAnswer = false;
  save();
  renderSrsCard();
}

function exportWrongBook() {
  const data = {
    type: "wrongBook",
    exportedAt: Date.now(),
    scope: wrongScope,
    items: (wrongScope === "current" && currentPassage())
      ? state.wrongBook.filter(w => w.passageId === currentPassage().id)
      : state.wrongBook.slice(),
    // 附带引用信息，便于查看时上下文
    passageIndex: state.passages.map(p => ({ id: p.id, customName: p.customName })),
    quizSetIndex: state.quizSets.map(qs => ({ id: qs.id, passageId: qs.passageId, name: qs.name })),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wrongbook_" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("已导出 " + data.items.length + " 条错题");
}

function importWrongBook() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json,application/json";
  inp.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        const items = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : []);
        if (!items.length) { alert("文件里没有错题条目"); return; }
        let added = 0, skipped = 0;
        items.forEach(w => {
          if (!w || !w.question) return;
          const dupId = w.qId && state.wrongBook.find(x => x.qId === w.qId);
          const dupQ = state.wrongBook.find(x => x.question === w.question && x.correctAnswer === w.correctAnswer);
          if (dupId || dupQ) { skipped++; return; }
          if (!w.id) w.id = uid("wb");
          if (!w.ts) w.ts = Date.now();
          state.wrongBook.push(w);
          added++;
        });
        save(); renderStats(); openWrongPanel();
        alert(`导入完成：新增 ${added} 条，跳过重复 ${skipped} 条`);
      } catch(err) {
        alert("导入失败：" + err.message);
      }
    };
    r.readAsText(f);
  };
  inp.click();
}

        <button data-act="retry">跳到原题</button>
        <button data-act="del">删除</button>
      </div>
    </div>`;
  }).join("") : `<div class="empty">${wrongScope==='current'?'当前板块暂无错题':'错题本为空'}</div>`;

  openModal({
    size: "full",
    title: "错题本",
    body: scopeBar + html,
    buttons: [
      { text: "⬇️ 导出错题", onclick: exportWrongBook },
      { text: "📂 导入错题", onclick: importWrongBook },
      { text: "🧹 清空当前", onclick: () => {

        const ids = new Set(list.map(w => w.id));

 *  错题练习会话 —— 在错题本内直接答题
 * ========================================================= */
let wbSession = null;
function startWrongBookPractice(list) {
  if (!list.length) return;
  wbSession = {
    queue: list.slice().sort(() => Math.random() - 0.5),
    total: list.length,
    doneIndex: 0,
    correctCount: 0,
    chosen: null,
    submitted: false
  };
  renderWbCard();
}
function renderWbCard() {
  if (!wbSession) return;
  if (wbSession.doneIndex >= wbSession.queue.length) {
    // 结束
    const acc = Math.round(wbSession.correctCount / wbSession.total * 100);
    openModal({
      title: "🎉 错题练习完成",
      body: `<div style="text-align:center;padding:20px;font-size:15px;line-height:1.9">
        本轮共练习 <b>${wbSession.total}</b> 题<br/>
        答对 <b style="color:#2e7d32">${wbSession.correctCount}</b> · 答错 <b style="color:#c62828">${wbSession.total - wbSession.correctCount}</b><br/>
        <span style="color:#888;font-size:13px">正确率 ${acc}%</span><br/><br/>
        <span style="color:#888;font-size:12px">💡 本轮答对的题目已自动从错题本移除</span>
      </div>`,
      buttons: [
        { text: "关闭", onclick: () => { wbSession = null; closeModal(); } },
        { text: "回到错题本", cls: "primary", onclick: () => { wbSession = null; closeModal(); openWrongPanel(); } }
      ]
    });
    return;
  }
  const w = wbSession.queue[wbSession.doneIndex];
  const pMap = {}; state.passages.forEach(pp => pMap[pp.id] = pp);
  const qsMap = {}; state.quizSets.forEach(qs => qsMap[qs.id] = qs);
  const pp = pMap[w.passageId], qs = qsMap[w.quizSetId];

  const tagsHTML = [
    pp ? `<span class="chip">${esc(pp.customName)}</span>` : "",
    qs ? `<span class="chip" style="background:#eee;color:#333">${esc(qs.name)}</span>` : "",
    `<span class="chip" style="background:#fce4ec;color:#c62828">${w.qType==='grammar'?'语法':'词汇'}</span>`,
  ].join("");

  const optsHTML = (w.options || []).map(opt => {
    const letter = (opt.match(/^([A-Z])[.\s、)]/) || [])[1] || opt[0];
    let cls = "q-opt";
    if (wbSession.submitted) {
      if (letter === w.correctAnswer) cls += " correct";
      else if (letter === wbSession.chosen) cls += " wrong";
    } else if (letter === wbSession.chosen) {
      cls += " selected";
    }
    return `<button class="${cls}" data-letter="${letter}">${esc(opt)}</button>`;
  }).join("");

  const statusHTML = wbSession.submitted
    ? (wbSession.chosen === w.correctAnswer
        ? `<div class="q-status ok">✓ Correct！本题会从错题本移除</div>`
        : `<div class="q-status err">✗ Wrong · 正确答案：${esc(w.correctAnswer)}</div>`)
    : "";
  const explainHTML = wbSession.submitted && w.explanation
    ? `<div class="q-explain show">${esc(w.explanation)}</div>`
    : "";
  const meta = `已上次答：<b style="color:#c62828">${esc(w.yourAnswer)}</b> · 正解：<b style="color:#2e7d32">${esc(w.correctAnswer)}</b>`;

  openModal({
    size: "full",
    title: `▶️ 错题练习 (${wbSession.doneIndex + 1}/${wbSession.total})`,
    body: `
      <div style="max-width:640px;margin:0 auto">
        <div style="margin-bottom:12px">${tagsHTML}</div>
        <div style="font-size:12px;color:#888;margin-bottom:12px">${meta}</div>
        <div class="q-card" style="margin:0">
          <div class="q-text">${esc(w.question)}</div>
          <div class="q-options" id="wbOpts">${optsHTML}</div>
          ${statusHTML}
          ${explainHTML}
        </div>
      </div>
    `,
    buttons: wbSession.submitted
      ? [
          { text: "退出", onclick: () => { wbSession = null; closeModal(); openWrongPanel(); } },
          { text: "下一题 →", cls: "primary", onclick: () => nextWbCard() }
        ]
      : [
          { text: "退出", onclick: () => { wbSession = null; closeModal(); openWrongPanel(); } },
          { text: "跳过", onclick: () => nextWbCard(true) },
          { text: "提交", cls: "primary", onclick: () => submitWbCard() }
        ]
  });

  document.querySelectorAll("#wbOpts .q-opt").forEach(btn => {
    btn.onclick = () => {
      if (wbSession.submitted) return;
      wbSession.chosen = btn.dataset.letter;
      renderWbCard();
    };
  });
}
function submitWbCard() {
  if (!wbSession) return;
  if (!wbSession.chosen) { toast("请先选择一个选项"); return; }
  const w = wbSession.queue[wbSession.doneIndex];
  wbSession.submitted = true;
  if (wbSession.chosen === w.correctAnswer) {
    wbSession.correctCount++;
    // 答对：从错题本移除，答题记录标为正确
    state.wrongBook = state.wrongBook.filter(x => x.id !== w.id);
    state.answerLog[w.qId] = { correct: true, chosen: wbSession.chosen, ts: Date.now() };
  } else {
    // 答错：更新记录里的 yourAnswer 和时间
    w.yourAnswer = wbSession.chosen;
    w.ts = Date.now();
    state.answerLog[w.qId] = { correct: false, chosen: wbSession.chosen, ts: Date.now() };
  }
  save();
  renderStats();
  renderWbCard();
}
function nextWbCard(skip) {
  if (!wbSession) return;
  wbSession.doneIndex++;
  wbSession.chosen = null;
  wbSession.submitted = false;
  renderWbCard();
}

/* ---------- Copy AI conversion prompt ---------- */
const AI_CONVERT_PROMPT = `你是一个 JSON 格式转换助手。
我会在下方【原始题目】里贴入我自己整理的英语题（格式可能杂乱：可能有阅读原文、可能没有；可能是选择题、填空题；可能有答案有解析，也可能没有）。

请把它们转换成可直接导入我英语学习 Dashboard 的合法 JSON，严格遵守下面的结构和规则。

【核心概念】
· 板块 (passage)：大主题分类，例如"虚拟语气专项""词汇辨析""定语从句"，顶部胶囊标签用它显示。
· 套题 (quizSet)：一个板块下可以有多套练习。例如"词汇辨析"板块下面可以有【比例与情感】【限制与终止】【一致与随机】等多套题。
· 题目 (grammarQuestions / vocabularyQuestions)：每题必须绑定到某个 passage 的 id 和某个 quizSet 的 id。

【输出的 JSON 结构】
{
  "version": "2.0",
  "passages": [
    {
      "id": "sec_001",
      "customName": "板块名（顶部胶囊）",
      "title": "板块标题",
      "content": ""
    }
  ],
  "quizSets": [
    {
      "id": "qs_001",
      "passageId": "sec_001",
      "name": "套题名（例如：比例与情感 / 套题 1 / 2024 六级真题）"
    }
  ],
  "grammarQuestions": [
    {
      "id": "g_001",
      "passageId": "sec_001",
      "quizSetId": "qs_001",
      "question": "题干原文",
      "options": ["A. ...", "B. ...", "C. ...", "D. ..."],
      "answer": "B",
      "explanation": "中文解析：说明考点、错项原因、正确项依据"
    }
  ],
  "vocabularyQuestions": [
    {
      "id": "v_001",
      "passageId": "sec_001",
      "quizSetId": "qs_001",
      "synonymGroup": "同义词组名，如 Gap Group；若无请填 \\"\\"",
      "question": "题干原文",
      "options": ["A. ...", "B. ...", "C. ...", "D. ..."],
      "answer": "A",
      "explanation": "中文解析"
    }
  ],
  "vocabularyBook": [],
  "synonymLibrary": [],
  "highlights": []
}

【如何决定用几个 passage / 几个 quizSet】
· 只有一个主题、一套练习 → 1 个 passage + 1 个 quizSet。
· 一个主题、多套练习（例如"词汇辨析"下面【比例与情感】【限制与终止】【一致与随机】【主要与强度】4 套）→
  → 只创建 1 个 passage（例如 "词汇辨析"），
  → 创建 4 个 quizSets（passageId 都指向同一个 passage），
  → 题目按套题归属分别绑定 quizSetId。
· 多个完全不同的主题（例如同时给了"虚拟语气"和"定语从句"两大主题）→
  → 拆成多个 passages，每个 passage 至少一个 quizSet。

【硬性规则，必须全部满足】
1. 只输出 JSON 本体，不要 Markdown 代码块（不要 \`\`\`json），不要任何解释文字。
2. 所有题目必须同时带 passageId 和 quizSetId，且这两个 id 必须能在 passages 和 quizSets 里找到。
3. 每个 quizSet 必须有 passageId，指向 passages 里存在的一个 id。
4. customName 是顶部胶囊标签名（板块名），name 是套题名（子标签），两者不同用途。
5. 若我没有提供阅读原文，content 填空字符串 ""。
6. 每题 options 长度 ≥2，每项以 "A. " "B. " "C. " "D. " 开头（英文点号+空格）。
7. answer 只能是单个大写字母 "A"/"B"/"C"/"D"（题目更多选项时可用 E/F）。
8. 语法类题目放 grammarQuestions；词汇/同义词辨析类放 vocabularyQuestions；无法分类默认 grammarQuestions。
9. 缺 answer → 请你判断补上；缺 explanation → 请你用中文补一段简明解析（考点 + 错项原因）。
10. 缺选项（例如填空题）→ 请改造成 4 选项单选题，正确答案在其中，其余为合理干扰项。
11. id 用顺序递增：sec_001, sec_002…；qs_001, qs_002…；g_001, g_002…；v_001, v_002…。
12. 题干保持英文原样，不要翻译；解析用中文。
13. 输出必须是能被 JSON.parse 直接解析的合法 JSON。

/* ---- 导入位置选择器 ---- */
function openImportPlacementDialog(data) {
  const jsonPassages = Array.isArray(data.passages) ? data.passages : [];
  const gCount = Array.isArray(data.grammarQuestions) ? data.grammarQuestions.length : 0;
  const vCount = Array.isArray(data.vocabularyQuestions) ? data.vocabularyQuestions.length : 0;
  const jsonQsCount = Array.isArray(data.quizSets) ? data.quizSets.length : 0;

  const passageOptions = state.passages.map(p =>
    `<option value="${esc(p.id)}">${esc(p.customName)}</option>`
  ).join("");

  // 预估：JSON 里涉及几个板块
  const involvedFromJson = new Set();
  jsonPassages.forEach(p => involvedFromJson.add(p.id));
  (Array.isArray(data.grammarQuestions)?data.grammarQuestions:[]).forEach(q => involvedFromJson.add(q.passageId));
  (Array.isArray(data.vocabularyQuestions)?data.vocabularyQuestions:[]).forEach(q => involvedFromJson.add(q.passageId));

        </div>` : ""}
