/**
 * 合并导入策略：
 * - passages：按 id 去重；若 id 冲突且 customName+content 不同，则分配新 id 并同步改写其关联题目的 passageId；完全相同则跳过。
 * - grammar/vocab 题：按 id 去重；若 id 冲突则重新生成新 id 后追加。
 * - vocabularyBook：按 word（大小写不敏感）去重。
 * - synonymLibrary：按 groupName 去重。
 * - highlights：全部追加（若无 id 补 id）。
 * - answerLog：合并（新数据覆盖旧数据的同 qId 记录）。
 * - wrongBook：按 qId 去重（保留最新的一条）。
 */
function mergeImportJSON(data, opts) {
  if (!data || typeof data !== "object") throw new Error("JSON 格式不正确");
  opts = opts || { pMode: "preserve", qMode: "perSet" };

  const report = {
    addedPassages: 0, skippedPassages: 0,
    addedQuizSets: 0,
    addedGrammar: 0, skippedGrammar: 0,
    addedVocab: 0, skippedVocab: 0,
    addedWords: 0, skippedWords: 0,
    addedGroups: 0, skippedGroups: 0,
    addedHighlights: 0,
    renamed: []
  };

  const existingPassageIds = new Set(state.passages.map(p => p.id));
  const existingPassageByKey = new Map();
  state.passages.forEach(p => existingPassageByKey.set((p.customName||"")+"|"+(p.content||""), p));

  const idRemap = {};              // 板块 id 重映射
  const qsIdRemap = {};            // 套题 id 重映射（JSON 显式 quizSets 用）
  const passageToQsMap = {};       // JSON 原 passageId → 目标套题 id（用于"每个 passage 建一个套题"）
  const remap = (pid) => (pid && idRemap[pid]) ? idRemap[pid] : pid;

  const incomingPassages = Array.isArray(data.passages) ? data.passages : [];
  const incomingQuizSets = Array.isArray(data.quizSets) ? data.quizSets : [];

  // ============ 步骤 1：处理目标板块（pMode）============
  let forcedPassageId = null;
  if (opts.pMode === "existing") {
    forcedPassageId = opts.targetPassageId;
    incomingPassages.forEach(p => { if (p?.id) idRemap[p.id] = forcedPassageId; });
  } else if (opts.pMode === "new") {
    const name = opts.newPassageName || "新板块";
    const newP = { id: uid("sec"), customName: name, title: name, content: "" };
    state.passages.push(newP);
    existingPassageIds.add(newP.id);
    report.addedPassages++;
    forcedPassageId = newP.id;
    incomingPassages.forEach(p => { if (p?.id) idRemap[p.id] = forcedPassageId; });
  } else {
    // preserve：原逻辑，JSON 里的板块按去重规则合并进来
    incomingPassages.forEach((p, i) => {
      if (!p || typeof p !== "object") return;
      if (!p.id) p.id = uid("sec");
      ensureCustomName(p, i);
      const key = (p.customName||"")+"|"+(p.content||"");
      if (existingPassageByKey.has(key)) {
        const existing = existingPassageByKey.get(key);
        if (existing.id !== p.id) idRemap[p.id] = existing.id;
        report.skippedPassages++;
        return;
      }
      if (existingPassageIds.has(p.id)) {
        const newId = uid("sec");
        report.renamed.push({ name: p.customName, oldId: p.id, newId });
        idRemap[p.id] = newId;
        p.id = newId;
      }
      state.passages.push(p);
      existingPassageIds.add(p.id);
      existingPassageByKey.set(key, p);
      report.addedPassages++;
    });
  }

  // ============ 步骤 2：确定目标套题（qMode）============
  const involvedPassageIds = new Set();
  (Array.isArray(data.grammarQuestions) ? data.grammarQuestions : []).forEach(q => q?.passageId && involvedPassageIds.add(remap(q.passageId)));
  (Array.isArray(data.vocabularyQuestions) ? data.vocabularyQuestions : []).forEach(q => q?.passageId && involvedPassageIds.add(remap(q.passageId)));

  const targetQsByPassage = {};

  if (opts.qMode === "existing") {
    const targetQs = state.quizSets.find(qs => qs.id === opts.targetQuizSetId);
    if (!targetQs) throw new Error("目标套题不存在");
    // 强制把所有题重定向到目标套题所在的板块 + 套题
    forcedPassageId = targetQs.passageId;
    incomingPassages.forEach(p => { if (p?.id) idRemap[p.id] = forcedPassageId; });
    involvedPassageIds.clear();
    involvedPassageIds.add(forcedPassageId);
    targetQsByPassage[forcedPassageId] = targetQs.id;
    state.currentQuizSetId[forcedPassageId] = targetQs.id;
  } else if (opts.qMode === "newOne") {
    involvedPassageIds.forEach(pid => {
      if (!pid) return;
      const existingSets = state.quizSets.filter(qs => qs.passageId === pid);
      const name = opts.newQuizSetName || ("套题 " + (existingSets.length + 1));
      const qs = { id: uid("qs"), passageId: pid, name, createdAt: Date.now() };
      state.quizSets.push(qs);
      targetQsByPassage[pid] = qs.id;
      state.currentQuizSetId[pid] = qs.id;
      report.addedQuizSets++;
    });
  } else {
    // qMode = perSet：保留 JSON 里"套题结构"
    // 情况 A：JSON 显式带 quizSets
    if (incomingQuizSets.length > 0) {
      incomingQuizSets.forEach(qs => {
        if (!qs?.id) return;
        const targetPid = remap(qs.passageId);
        if (!targetPid) return;
        let target = state.quizSets.find(x => x.passageId === targetPid && x.name === qs.name);
        if (!target) {
          const existingSets = state.quizSets.filter(x => x.passageId === targetPid);
          const name = qs.name || ("套题 " + (existingSets.length + 1));
          target = { id: uid("qs"), passageId: targetPid, name, createdAt: qs.createdAt || Date.now() };
          state.quizSets.push(target);
          report.addedQuizSets++;
        }
        qsIdRemap[qs.id] = target.id;
        state.currentQuizSetId[targetPid] = target.id;
      });
    }
    // 情况 B：JSON 没有 quizSets，但有多个 passages
    // 此时如果用户选择了"导入到现有/新建板块"，就把 JSON 里每个 passage 转成一个套题
    // （用 passage 的 customName 作为套题名，题目按原 passage 归属对应套题）
    if (forcedPassageId && incomingPassages.length > 0) {
      incomingPassages.forEach(p => {
        if (!p?.id) return;
        const setName = (p.customName || p.title || "套题").trim() || "套题";
        // 目标板块下若已有同名套题，复用；否则新建
        let target = state.quizSets.find(x => x.passageId === forcedPassageId && x.name === setName);
        if (!target) {
          target = { id: uid("qs"), passageId: forcedPassageId, name: setName, createdAt: Date.now() };
          state.quizSets.push(target);
          report.addedQuizSets++;
        }
        // 用"原 passageId"→套题 id 的映射，在 pickQuizSetId 里查
        passageToQsMap[p.id] = target.id;
        state.currentQuizSetId[forcedPassageId] = target.id;
      });
    }
  }

  function pickQuizSetId(q, origPid) {
    const pid = q.passageId;
    // 优先：JSON 原 passage → 套题（"每个 passage 建一个套题"模式）
    if (origPid && passageToQsMap[origPid]) return passageToQsMap[origPid];
    if (targetQsByPassage[pid]) return targetQsByPassage[pid];
    if (q.quizSetId && qsIdRemap[q.quizSetId]) return qsIdRemap[q.quizSetId];
    // 兜底：给该 passage 用第一套或新建
    let existingSets = state.quizSets.filter(qs => qs.passageId === pid);
    if (existingSets.length === 0) {
      const qs = { id: uid("qs"), passageId: pid, name: "套题 1", createdAt: Date.now() };
      state.quizSets.push(qs);
      report.addedQuizSets++;
      targetQsByPassage[pid] = qs.id;
      state.currentQuizSetId[pid] = qs.id;
      return qs.id;
    }
    targetQsByPassage[pid] = existingSets[0].id;
    return existingSets[0].id;
  }

  // 2. Grammar questions
  const existingGIds = new Set(state.grammarQuestions.map(q => q.id));
  (Array.isArray(data.grammarQuestions) ? data.grammarQuestions : []).forEach(q => {
    if (!q || !q.question) return;
    if (!q.id) q.id = uid("g");
    const _origPid_g = q.passageId;
    q.passageId = remap(q.passageId);
    if (existingGIds.has(q.id)) {
      // dedupe by identical question+passageId
      const dup = state.grammarQuestions.find(x =>
        x.id === q.id || (x.passageId === q.passageId && x.question === q.question));
      if (dup) { report.skippedGrammar++; return; }
      q.id = uid("g");
    } else {
      const dup = state.grammarQuestions.find(x =>
        x.passageId === q.passageId && x.question === q.question);
      if (dup) { report.skippedGrammar++; return; }
    }
    q.quizSetId = pickQuizSetId(q, _origPid_g);
    state.grammarQuestions.push(q);
    existingGIds.add(q.id);
    report.addedGrammar++;
  });

  // 3. Vocab questions
  const existingVIds = new Set(state.vocabularyQuestions.map(q => q.id));
  (Array.isArray(data.vocabularyQuestions) ? data.vocabularyQuestions : []).forEach(q => {
    if (!q || !q.question) return;
    if (!q.id) q.id = uid("v");
    const _origPid_v = q.passageId;
    q.passageId = remap(q.passageId);
    if (existingVIds.has(q.id)) {
      const dup = state.vocabularyQuestions.find(x =>
        x.id === q.id || (x.passageId === q.passageId && x.question === q.question));
      if (dup) { report.skippedVocab++; return; }
      q.id = uid("v");
    } else {
      const dup = state.vocabularyQuestions.find(x =>
        x.passageId === q.passageId && x.question === q.question);
      if (dup) { report.skippedVocab++; return; }
    }
    q.quizSetId = pickQuizSetId(q, _origPid_v);
    state.vocabularyQuestions.push(q);
    existingVIds.add(q.id);
    report.addedVocab++;
  });

  // 4. Vocabulary book
  (Array.isArray(data.vocabularyBook) ? data.vocabularyBook : []).forEach(v => {
    if (!v || !v.word) return;
    const exists = state.vocabularyBook.find(x => x.word.toLowerCase() === v.word.toLowerCase());
    if (exists) { report.skippedWords++; return; }
    if (!v.addedAt) v.addedAt = Date.now();
    state.vocabularyBook.push(v);
    report.addedWords++;
  });

  // 5. Synonym library
  (Array.isArray(data.synonymLibrary) ? data.synonymLibrary : []).forEach(g => {
    if (!g || !g.groupName) return;
    const exists = state.synonymLibrary.find(x => x.groupName === g.groupName);
    if (exists) {
      // merge words
      const set = new Set((exists.words||[]).map(w => w.toLowerCase()));
      let added = 0;
      (g.words||[]).forEach(w => { if (!set.has(w.toLowerCase())) { exists.words.push(w); set.add(w.toLowerCase()); added++; } });
      if (added === 0) report.skippedGroups++;
      else report.addedGroups++;   // treat as "updated"
      return;
    }
    state.synonymLibrary.push(g);
    report.addedGroups++;
  });

  // 6. Highlights (append, remap passageId)
  (Array.isArray(data.highlights) ? data.highlights : []).forEach(h => {
    if (!h) return;
    if (!h.id) h.id = uid("hl");
    h.passageId = remap(h.passageId);
    state.highlights.push(h);
    report.addedHighlights++;
  });

  // 7. answerLog + wrongBook (best-effort merge)
  if (data.answerLog && typeof data.answerLog === "object") {
    Object.assign(state.answerLog, data.answerLog);
  }
  (Array.isArray(data.wrongBook) ? data.wrongBook : []).forEach(w => {
    if (!w || !w.qId) return;
    if (!w.id) w.id = uid("wb");
    w.passageId = remap(w.passageId);
    state.wrongBook = state.wrongBook.filter(x => x.qId !== w.qId);
    state.wrongBook.push(w);
  });

  // ensure current passage
  if (!state.currentPassageId && state.passages.length) {
    state.currentPassageId = state.passages[0].id;
  }
  save();
  return report;
}

function importJSON(data) {
  if (!data || typeof data !== "object") throw new Error("JSON 格式不正确");
  const passages = Array.isArray(data.passages) ? data.passages : [];
  passages.forEach((p, i) => {
    if (!p.id) p.id = uid("sec");
    ensureCustomName(p, i);
    if (typeof p.content !== "string") p.content = "";
  });
  state.passages = passages;
  state.quizSets = Array.isArray(data.quizSets) ? data.quizSets : [];
  state.grammarQuestions = Array.isArray(data.grammarQuestions) ? data.grammarQuestions : [];
  state.vocabularyQuestions = Array.isArray(data.vocabularyQuestions) ? data.vocabularyQuestions : [];
  state.vocabularyBook = Array.isArray(data.vocabularyBook) ? data.vocabularyBook : [];
  state.synonymLibrary = Array.isArray(data.synonymLibrary) ? data.synonymLibrary : [];
  state.highlights = Array.isArray(data.highlights) ? data.highlights : [];
  state.wrongBook = Array.isArray(data.wrongBook) ? data.wrongBook : [];
  state.answerLog = data.answerLog || {};
  state.currentQuizSetId = data.currentQuizSetId || {};
  state.currentPassageId = data.currentPassageId || (passages[0] && passages[0].id) || null;
  // ensure ids
  state.highlights.forEach(h => { if (!h.id) h.id = uid("hl"); });
  state.grammarQuestions.forEach(q => { if (!q.id) q.id = uid("g"); });
  state.vocabularyQuestions.forEach(q => { if (!q.id) q.id = uid("v"); });
  state.quizSets.forEach(qs => { if (!qs.id) qs.id = uid("qs"); });

  // 老版数据：为每个板块补一套默认套题，并把没归属的题划入
  state.passages.forEach(p => {
    const has = state.quizSets.some(qs => qs.passageId === p.id);
    if (!has) {
      const qs = { id: uid("qs"), passageId: p.id, name: "套题 1", createdAt: Date.now() };
      state.quizSets.push(qs);
    }
  });
  const defaultQsByPassage = {};
  state.passages.forEach(p => {
    defaultQsByPassage[p.id] = state.quizSets.find(qs => qs.passageId === p.id)?.id || null;
  });
  state.grammarQuestions.forEach(q => { if (!q.quizSetId) q.quizSetId = defaultQsByPassage[q.passageId]; });
  state.vocabularyQuestions.forEach(q => { if (!q.quizSetId) q.quizSetId = defaultQsByPassage[q.passageId]; });
  state.wrongBook.forEach(w => { if (!w.quizSetId) w.quizSetId = defaultQsByPassage[w.passageId]; });

  save();
  renderAll();
}

function buildExportObject() {
  state.passages.forEach((p, i) => ensureCustomName(p, i));
  return {
    version: "2.0",
    schemaVersion: CURRENT_SCHEMA,
    exportedAt: Date.now(),
    passages: state.passages,
    quizSets: state.quizSets,
    grammarQuestions: state.grammarQuestions,
    vocabularyQuestions: state.vocabularyQuestions,
    vocabularyBook: state.vocabularyBook,
    synonymLibrary: state.synonymLibrary,
    highlights: state.highlights,
    wrongBook: state.wrongBook,
    answerLog: state.answerLog,
    currentPassageId: state.currentPassageId,
    currentQuizSetId: state.currentQuizSetId,
  };
}

/* =========================================================
 *  BACKUP REMINDER
 * ========================================================= */
const REMIND_AFTER_DAYS = 14;      // 超过 N 天没导出就提醒
const DISMISS_SNOOZE_MS = 3*24*3600*1000;   // 稍后按钮：3 天内不再打扰

function checkBackupReminder() {
  const banner = document.getElementById("backupBanner");
  if (!banner) return;
  // no data => no reminder
  if (!state.passages.length && !state.vocabularyBook.length) { banner.style.display = "none"; return; }
  const now = Date.now();
  if (meta.snoozeUntil && now < meta.snoozeUntil) { banner.style.display = "none"; return; }
  const last = meta.lastExportTs || 0;
  const days = last ? Math.floor((now - last) / 86400000) : 999;
  if (days >= REMIND_AFTER_DAYS) {
    const txt = last
      ? `⚠️ 你已经 ${days} 天没有导出备份了，为了避免浏览器清缓存导致数据丢失，建议立即导出或开启云同步。`
      : `⚠️ 你还从未导出过备份。数据只存在这台浏览器里，建议现在导出一份 JSON 或开启云同步。`;
    document.getElementById("backupBannerText").textContent = txt;
    banner.style.display = "flex";
  } else {
    banner.style.display = "none";
  }
}
function dismissBackupBanner() {
  meta.snoozeUntil = Date.now() + DISMISS_SNOOZE_MS;
  saveMeta();
  document.getElementById("backupBanner").style.display = "none";
}

function readCloudInputs() {
  const token = (document.getElementById("gistToken")?.value || meta.gist.token || "").trim();
  const gistId = (document.getElementById("gistId")?.value || meta.gist.gistId || "").trim();
  const filename = (document.getElementById("gistFn")?.value || meta.gist.filename || "dashboard.json").trim();
  return { token, gistId, filename };
}

async function cloudUpload() {
  const { token, gistId, filename } = readCloudInputs();
  if (!token) { alert("请填写 GitHub Token"); return; }
  const body = {
    description: "English Dashboard Backup",
    public: false,
    files: { [filename]: { content: JSON.stringify(buildExportObject(), null, 2) } }
  };
  try {
    toast("上传中...");
    let url = "https://api.github.com/gists";
    let method = "POST";
    if (gistId) { url += "/" + gistId; method = "PATCH"; }
    const res = await fetch(url, {
      method,
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(res.status + " " + t.slice(0, 200));
    }
    const data = await res.json();
    meta.gist.token = token;
    meta.gist.gistId = data.id || gistId;
    meta.gist.filename = filename;
    meta.gist.lastSyncTs = Date.now();
    saveMeta();
    toast("✅ 已上传到 Gist（ID: " + meta.gist.gistId.slice(0,8) + "…）");
  } catch(e) {
    alert("上传失败：" + e.message);
  }
}

async function cloudDownload() {
  const { token, gistId, filename } = readCloudInputs();
  if (!token || !gistId) { alert("请先填写 Token 和 Gist ID"); return; }
  if (!confirm("将【覆盖】本地数据为云端最新版本，确定继续吗？（本地会先自动备份到 " + BACKUP_KEY + "）")) return;
  try {
    toast("拉取中...");
    const res = await fetch("https://api.github.com/gists/" + gistId, {
      headers: { "Accept": "application/vnd.github+json", "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error(res.status + " " + (await res.text()).slice(0,200));
    const data = await res.json();
    const file = data.files?.[filename] || Object.values(data.files||{})[0];
    if (!file || !file.content) throw new Error("Gist 中未找到数据文件");
    const parsed = JSON.parse(file.content);
    // save current as backup before override
    localStorage.setItem(BACKUP_KEY, localStorage.getItem(STORE_KEY) || "");
    importJSON(parsed);
    meta.gist.token = token;
    meta.gist.gistId = gistId;
    meta.gist.filename = filename;
    meta.gist.lastSyncTs = Date.now();
    saveMeta();
    toast("✅ 已从云端恢复");
    closeModal();
  } catch(e) {
    alert("拉取失败：" + e.message);
  }
}

/* ---- QuizSet 套题工具 ---- */
function getQuizSets(passageId) {
  return state.quizSets.filter(qs => qs.passageId === passageId);
}
function ensureDefaultQuizSet(passageId) {
  const list = getQuizSets(passageId);
  if (list.length === 0) {
    const qs = { id: uid("qs"), passageId, name: "套题 1", createdAt: Date.now() };
    state.quizSets.push(qs);
    return qs;
  }
  return list[0];
}
function currentQuizSet() {
  const p = currentPassage();
  if (!p) return null;
  const list = getQuizSets(p.id);
  if (!list.length) return ensureDefaultQuizSet(p.id);
  const savedId = state.currentQuizSetId[p.id];
  return list.find(x => x.id === savedId) || list[0];
}
// 获取当前板块激活的套题 id 数组
function getActiveQuizSetIds() {
  const p = currentPassage();
  if (!p) return [];
  const list = getQuizSets(p.id);
  if (!list.length) return [];
  const stored = state.activeQuizSetIds[p.id];
  if (Array.isArray(stored) && stored.length) {
    const valid = stored.filter(id => list.some(x => x.id === id));
    if (valid.length) return valid;
  }
  // 兼容：回退到 currentQuizSetId 或首个
  const single = list.find(x => x.id === state.currentQuizSetId[p.id]);
  return [single?.id || list[0].id];
}
function setActiveQuizSetIds(ids) {
  const p = currentPassage();
  if (!p) return;
  state.activeQuizSetIds[p.id] = ids.slice();
  if (ids.length === 1) state.currentQuizSetId[p.id] = ids[0];
  save();
  renderSectionTitleBar();
  renderRightPane();
}
function switchQuizSet(qsId) {
  setActiveQuizSetIds([qsId]);
}
function addQuizSet() {
  const p = currentPassage();
  if (!p) { toast("请先创建板块"); return; }
  const list = getQuizSets(p.id);
  const defaultName = "套题 " + (list.length + 1);
  const name = prompt("请输入套题名称", defaultName);
  if (name === null) return;
  const finalName = (name || "").trim() || defaultName;
  const qs = { id: uid("qs"), passageId: p.id, name: finalName, createdAt: Date.now() };
  state.quizSets.push(qs);
  state.currentQuizSetId[p.id] = qs.id;
  save();
  renderSectionTitleBar();
  renderRightPane();
}
function renameQuizSet(qsId) {
  const qs = state.quizSets.find(x => x.id === qsId);
  if (!qs) return;
  const name = prompt("修改套题名称", qs.name);
  if (name === null) return;
  if (!name.trim()) { toast("名称不能为空"); return; }
  qs.name = name.trim();
  save();
  renderSectionTitleBar();
}
function deleteQuizSet(qsId) {
  const qs = state.quizSets.find(x => x.id === qsId);
  if (!qs) return;
  const p = state.passages.find(x => x.id === qs.passageId);
  const gCount = state.grammarQuestions.filter(q => q.quizSetId === qsId).length;
  const vCount = state.vocabularyQuestions.filter(q => q.quizSetId === qsId).length;
  const ok = confirm(
    `确认删除该套题？\n\n套题：${qs.name}\n板块：${p?.customName || ""}\n\n将同时删除：${gCount} 道语法题、${vCount} 道词汇题、以及相关答题记录和错题。`
  );
  if (!ok) return;
  const removedQIds = new Set([
    ...state.grammarQuestions.filter(q => q.quizSetId === qsId).map(q => q.id),
    ...state.vocabularyQuestions.filter(q => q.quizSetId === qsId).map(q => q.id),
  ]);
  state.grammarQuestions = state.grammarQuestions.filter(q => q.quizSetId !== qsId);
  state.vocabularyQuestions = state.vocabularyQuestions.filter(q => q.quizSetId !== qsId);
  state.wrongBook = state.wrongBook.filter(w => w.quizSetId !== qsId && !removedQIds.has(w.qId));
  Object.keys(state.answerLog).forEach(k => { if (removedQIds.has(k)) delete state.answerLog[k]; });
  state.quizSets = state.quizSets.filter(x => x.id !== qsId);
  // 切到相邻套题
  if (p) {
    const list = getQuizSets(p.id);
    state.currentQuizSetId[p.id] = list[0]?.id || null;
  }
  save();
  renderSectionTitleBar();
  renderRightPane();
  renderStats();
}

function renderSectionTitleBar() {
  const el = document.getElementById("sectionTitleBar");
  if (!el) return;
  const p = currentPassage();
  if (!p) {
    el.innerHTML = `<h1>暂无学习板块</h1><div class="sub">请在顶部新增板块或从「🐈 设置 → 导入 JSON」开始</div>`;
    return;
  }
  // 确保该板块至少有一套题
  const sets = getQuizSets(p.id);
  if (sets.length === 0) ensureDefaultQuizSet(p.id);
  const cur = currentQuizSet();

  el.innerHTML = `
    <h1 id="passageTitleEditable" contenteditable="true" spellcheck="false" title="点击编辑标题">${esc(p.title || p.customName)}</h1>
    <div class="sub">板块：${esc(p.customName)} · <span style="color:#bbb">点击标题可直接修改</span></div>
    <div class="quizset-bar" id="qsBar"></div>
  `;
  const titleEl = document.getElementById("passageTitleEditable");
  titleEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); titleEl.blur(); }
  });
  titleEl.addEventListener("blur", () => {
    const newTitle = (titleEl.textContent || "").trim();
    const cur2 = currentPassage();
    if (!cur2) return;
    if (!newTitle) { titleEl.textContent = cur2.title || cur2.customName; return; }
    if (newTitle === (cur2.title || cur2.customName)) return;
    cur2.title = newTitle;
    save();
    toast("标题已保存");
  });
  const bar = document.getElementById("qsBar");
  const allSets = getQuizSets(p.id);
  const activeIds = getActiveQuizSetIds();
  // 当前激活标签
  const tag = document.createElement("div");
  tag.className = "qs-active-tag";
  if (activeIds.length === 1) {
    const one = allSets.find(x => x.id === activeIds[0]);
    tag.textContent = one?.name || "套题";
  } else {
    tag.innerHTML = `已选 ${activeIds.length} 套 <span class="qs-count">/ ${allSets.length}</span>`;
  }
  bar.appendChild(tag);

  // "套题列表 ▾" 按钮
  const listBtn = document.createElement("div");
  listBtn.className = "qs-list-btn";
  listBtn.innerHTML = `📚 套题列表 <span style="opacity:.6">(${allSets.length})</span> ▾`;
  listBtn.onclick = (e) => { e.stopPropagation(); toggleQuizSetPanel(listBtn); };
  bar.appendChild(listBtn);

  const addBtn = document.createElement("div");
  addBtn.className = "qs-list-btn add";
  addBtn.textContent = "+ 新增套题";
  addBtn.onclick = addQuizSet;
  bar.appendChild(addBtn);
}

/* ---- 套题列表下拉面板 ---- */
let qsPanelEl = null;
let qsPanelTempChecked = null;   // Set 缓存正在编辑的选中集合
function toggleQuizSetPanel(anchor) {
  if (qsPanelEl) { closeQuizSetPanel(); return; }
  openQuizSetPanel(anchor);
}
function closeQuizSetPanel() {
  if (qsPanelEl) { qsPanelEl.remove(); qsPanelEl = null; qsPanelTempChecked = null; }
  document.removeEventListener("mousedown", handleQsPanelOutside, true);
}
function handleQsPanelOutside(e) {
  if (qsPanelEl && !qsPanelEl.contains(e.target) && !e.target.classList.contains("qs-list-btn")) {
    closeQuizSetPanel();
  }
}
function openQuizSetPanel(anchor) {
  const p = currentPassage();
  if (!p) return;
  const allSets = getQuizSets(p.id);
  qsPanelTempChecked = new Set(getActiveQuizSetIds());

  qsPanelEl = document.createElement("div");
  qsPanelEl.className = "qs-panel";
  qsPanelEl.innerHTML = `
    <div class="qs-panel-head">
      <input id="qsSearchBox" placeholder="搜索套题..." />
    </div>
    <div class="qs-panel-actions">
      <button data-a="all">全选</button>
      <button data-a="none">清空</button>
      <span style="margin-left:auto;color:#888" id="qsSelCount"></span>
    </div>
    <div class="qs-panel-list" id="qsPanelList"></div>
    <div class="qs-panel-foot">
      <span id="qsFootHint" style="color:#888"></span>
      <div style="display:flex;gap:6px">
        <button onclick="closeQuizSetPanel()">取消</button>
        <button class="primary" id="qsApplyBtn">应用</button>
      </div>
    </div>
  `;
  document.body.appendChild(qsPanelEl);
  // position under anchor
  const r = anchor.getBoundingClientRect();
  const left = Math.min(r.left + window.scrollX, window.innerWidth - 480);
  qsPanelEl.style.left = Math.max(8, left) + "px";
  qsPanelEl.style.top = (r.bottom + window.scrollY + 4) + "px";

  const renderList = (kw = "") => {
    const listEl = qsPanelEl.querySelector("#qsPanelList");
    listEl.innerHTML = "";
    const filtered = allSets.filter(qs => !kw || qs.name.toLowerCase().includes(kw.toLowerCase()));
    if (!filtered.length) {
      listEl.innerHTML = `<div style="padding:20px;text-align:center;color:#999;font-size:12px">无匹配套题</div>`;
      return;
    }
    filtered.forEach(qs => {
      const gc = state.grammarQuestions.filter(q => q.quizSetId === qs.id).length;
      const vc = state.vocabularyQuestions.filter(q => q.quizSetId === qs.id).length;
      const item = document.createElement("div");
      item.className = "qs-item" + (qsPanelTempChecked.has(qs.id) ? " checked" : "");
      item.innerHTML = `
        <input type="checkbox" ${qsPanelTempChecked.has(qs.id) ? "checked" : ""}/>
        <div class="qs-nm">${esc(qs.name)}</div>
        <div class="qs-mt">${gc}G/${vc}V</div>
        <button class="qs-mini-btn" data-a="edit" title="重命名">✎</button>
        <button class="qs-mini-btn" data-a="del" title="删除">×</button>
      `;
      const cb = item.querySelector("input");
      const toggle = () => {
        if (qsPanelTempChecked.has(qs.id)) qsPanelTempChecked.delete(qs.id);
        else qsPanelTempChecked.add(qs.id);
        cb.checked = qsPanelTempChecked.has(qs.id);
        item.classList.toggle("checked", qsPanelTempChecked.has(qs.id));
        updateFoot();
      };
      item.addEventListener("click", (e) => {
        if (e.target.closest(".qs-mini-btn") || e.target.tagName === "INPUT") return;
        toggle();
      });
      cb.addEventListener("change", toggle);
      item.querySelector("[data-a='edit']").onclick = (e) => { e.stopPropagation(); closeQuizSetPanel(); renameQuizSet(qs.id); };
      item.querySelector("[data-a='del']").onclick = (e) => { e.stopPropagation(); closeQuizSetPanel(); deleteQuizSet(qs.id); };
      listEl.appendChild(item);
    });
  };
  const updateFoot = () => {
    qsPanelEl.querySelector("#qsSelCount").textContent = `已选 ${qsPanelTempChecked.size} / ${allSets.length}`;
    const totalQ = allSets
      .filter(qs => qsPanelTempChecked.has(qs.id))
      .reduce((sum, qs) => sum
        + state.grammarQuestions.filter(q => q.quizSetId === qs.id).length
        + state.vocabularyQuestions.filter(q => q.quizSetId === qs.id).length, 0);
    qsPanelEl.querySelector("#qsFootHint").textContent = `合计 ${totalQ} 题`;
  };
  renderList();
  updateFoot();

  qsPanelEl.querySelector("#qsSearchBox").oninput = (e) => renderList(e.target.value);
  qsPanelEl.querySelector("[data-a='all']").onclick = () => { allSets.forEach(qs => qsPanelTempChecked.add(qs.id)); renderList(qsPanelEl.querySelector("#qsSearchBox").value); updateFoot(); };
  qsPanelEl.querySelector("[data-a='none']").onclick = () => { qsPanelTempChecked.clear(); renderList(qsPanelEl.querySelector("#qsSearchBox").value); updateFoot(); };
  qsPanelEl.querySelector("#qsApplyBtn").onclick = () => {
    if (qsPanelTempChecked.size === 0) { toast("至少选择一套题"); return; }
    setActiveQuizSetIds([...qsPanelTempChecked]);
    closeQuizSetPanel();
  };

  setTimeout(() => document.addEventListener("mousedown", handleQsPanelOutside, true), 0);
}

loadMeta();
load();
if (state.passages.length === 0) {
  loadSeed();
} else {
  renderAll();
}
// 首帧后再检查提醒，避免打扰首屏
setTimeout(checkBackupReminder, 1200);
</script>
</body>
</html>
