<title>Study Dashboard — Unified</title>
<style>
/* ============================================================
   APPLE HUMAN INTERFACE — DARK THEME — UNIFIED DESIGN SYSTEM
   ============================================================ */
:root {
  --bg: #FFFFFF;
  --bg-elev: #F5F5F7;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F0F0F2;
  --bg-input: #FFFFFF;
  --bg-popover: #FFFFFF;
  --ink: #1D1D1F;
  --ink-secondary: #6E6E73;
  --ink-tertiary: #8E8E93;
  --ink-faint: #D1D1D6;
  --line: #D2D2D7;
  --line-light: #E5E5EA;
  --accent: #1D1D1F;
  --accent-hover: #333333;
  --green: #1D1D1F;
  --red: #555555;
  --orange: #666666;
  --yellow: #888888;
  --purple: #555555;
  --pink: #555555;
  --teal: #555555;

  --english: #1D1D1F;
  --english-tint: rgba(0,0,0,0.04);
  --chinese: #444444;
  --chinese-tint: rgba(0,0,0,0.03);
  --politic: #888888;
  --politic-tint: rgba(0,0,0,0.03);

  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --radius-pill: 999px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
  --blur: saturate(180%) blur(20px);

  --sidebar-w: 240px;
  --topbar-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
::selection { background: rgba(0,0,0,0.1); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #CCC; border-radius: 10px; }
::-webkit-scrollbar-track { background: transparent; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font: inherit; color: var(--ink); background: var(--bg-input); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px 12px; outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; }

/* ========== LAYOUT ========== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas: "sidebar topbar" "sidebar content";
  height: 100vh;
  overflow: hidden;
}

/* ========== SIDEBAR ========== */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-elev);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  gap: 20px;
  overflow-y: auto;
}
.sidebar-brand {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.02em;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 0;
}
.sidebar-brand .logo {
  display: none;
}

/* Apple Capsule Menu */
.capsule-menu {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.capsule-item {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}
.capsule-item:hover { background: var(--bg-card-hover); color: var(--ink); }
.capsule-item.active { background: var(--accent); color: #FFFFFF; }
.capsule-item .icon { font-size: 16px; width: 20px; text-align: center; }

/* Sidebar Subject Pills */
.sidebar-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-tertiary);
  padding: 0 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-subjects {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.subject-pill {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.12s ease;
}
.subject-pill:hover { background: var(--bg-card); color: var(--ink); }
.subject-pill.active { background: var(--bg-card); color: var(--ink); font-weight: 600; }
.subject-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.subject-pill .badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  background: var(--bg-card-hover);
  color: var(--ink-secondary);
}

/* ========== TOPBAR ========== */
.topbar {
  grid-area: topbar;
  background: rgba(255,255,255,0.85);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.topbar-title {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
}
.topbar-search {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.topbar-search input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border-radius: var(--radius-pill);
  background: var(--bg-card);
  border: 1px solid var(--line);
  font-size: 13px;
}
.topbar-search input:focus { border-color: var(--accent); background: var(--bg-input); }
.topbar-search .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--ink-tertiary);
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

/* Apple Capsule Button */
.apple-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.12s ease;
  white-space: nowrap;
}
.apple-btn:hover { background: var(--bg-card-hover); border-color: var(--ink-faint); }
.apple-btn:active { transform: scale(0.97); }
.apple-btn.primary { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.apple-btn.primary:hover { background: var(--accent-hover); color: #FFFFFF; }
.apple-btn.danger { color: #1D1D1F; border-color: rgba(0,0,0,0.1); }
.apple-btn.danger:hover { background: rgba(0,0,0,0.03); }
.apple-btn.small { padding: 5px 10px; font-size: 11px; }
.apple-btn.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }

/* ========== CONTENT AREA ========== */
.content {
  grid-area: content;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ========== QUIZ HUB STYLES ========== */
.quiz-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.section-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg-card);
  color: var(--ink-secondary);
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  user-select: none;
  transition: all 0.12s ease;
}
.pill:hover { background: var(--bg-card-hover); color: var(--ink); }
.pill.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.pill .pill-act { opacity: 0.5; font-size: 10px; padding: 0 3px; border-radius: 4px; }
.pill .pill-act:hover { opacity: 1; }
.pill.add { background: transparent; border: 1px dashed var(--ink-faint); color: var(--ink-tertiary); }
.pill.add:hover { border-color: var(--ink-secondary); color: var(--ink); }

.quiz-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-card);
  padding: 3px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  max-width: 300px;
}
.quiz-tab {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.12s ease;
}
.quiz-tab.active { background: var(--accent); color: #FFFFFF; }
.quiz-tab:hover:not(.active) { color: var(--ink); }

.quizset-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.quizset-bar label { font-size: 12px; color: var(--ink-tertiary); }
.quizset-bar select {
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--ink);
}

/* Question cards */
.q-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
  transition: border-color 0.15s ease;
}
.q-card:hover { border-color: var(--ink-faint); }
.q-meta { font-size: 10px; color: var(--ink-tertiary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.q-tool-btn {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-pill);
  background: var(--bg-elev);
  color: var(--ink-secondary);
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all 0.12s ease;
}
.q-tool-btn:hover { background: var(--bg-card-hover); color: var(--ink); }
.q-text { font-size: 14px; line-height: 1.7; margin-bottom: 12px; color: var(--ink); }
.q-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.q-opt {
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  background: var(--bg-elev);
  text-align: left;
  color: var(--ink);
  transition: all 0.12s ease;
  user-select: text;
}
.q-opt:hover { background: var(--bg-card-hover); border-color: var(--ink-faint); }
.q-opt.selected { border-color: #1D1D1F; background: rgba(0,0,0,0.03); }
.q-opt.correct { border-color: #1D1D1F; background: rgba(0,0,0,0.04); color: #1D1D1F; }
.q-opt.wrong { border-color: #AAA; background: rgba(0,0,0,0.03); color: #999; }
.q-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.q-actions button {
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.12s ease;
}
.q-actions button:hover { background: var(--bg-card-hover); }
.q-actions button:active { transform: scale(0.97); }
.q-actions button.primary { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.q-actions button.primary:hover { background: var(--accent-hover); }
.q-explain {
  margin-top: 10px;
  padding: 12px 14px;
  background: var(--bg-elev);
  border-left: 3px solid rgba(0,0,0,0.15);
  font-size: 12px;
  line-height: 1.7;
  color: var(--ink-secondary);
  border-radius: var(--radius-sm);
  display: none;
}
.q-explain.show { display: block; }
.q-status { margin-top: 8px; font-size: 12px; font-weight: 600; }
.q-status.ok { color: #1D1D1F; }
.q-status.err { color: #999; }

/* Reading area */
.reading-body {
  font-size: 15px;
  line-height: 2;
  color: var(--ink);
  white-space: pre-wrap;
  word-wrap: break-word;
}
.reading-body .word { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.reading-body .word:hover { background: rgba(0,0,0,0.04); }
.reading-body .hl-yellow { background: rgba(0,0,0,0.08); }
.reading-body .hl-blue { background: rgba(0,0,0,0.05); }
.reading-body .hl-pink { background: rgba(0,0,0,0.1); }
.reading-body .hl { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.reading-body .hl.has-note { box-shadow: inset 0 -2px 0 rgba(255,255,255,0.4); }
.reading-body .replaced { color: #666; font-weight: 600; }

.sel-menu {
  position: fixed;
  z-index: 5000;
  background: #1D1D1F;
  border: 1px solid #333;
  border-radius: var(--radius-pill);
  padding: 5px;
  display: flex;
  gap: 4px;
  box-shadow: var(--shadow-lg);
  font-size: 12px;
  backdrop-filter: var(--blur);
}
.sel-menu button {
  background: transparent;
  color: #FFFFFF;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all 0.12s;
}
.sel-menu button:hover { background: rgba(255,255,255,0.1); }
.sel-menu .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }

/* ========== STUDY RESOURCES STYLES ========== */
.res-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.res-stat-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.res-stat-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.res-stat-card .label { font-size: 11px; font-weight: 600; color: var(--ink-tertiary); text-transform: uppercase; letter-spacing: 0.04em; }
.res-stat-card .value { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.res-stat-card .sub { font-size: 11px; color: var(--ink-tertiary); }
.res-stat-card.countdown { background: var(--bg-card); border-color: var(--line); }
.res-stat-card.countdown .value { color: var(--ink); }

.res-filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.res-filter-bar label { font-size: 11px; font-weight: 600; color: var(--ink-tertiary); }
.res-filter-bar select {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--ink);
}

.res-section { margin-bottom: 30px; }
.res-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.res-section-head h3 {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.res-section-head .count-pill {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-tertiary);
  background: var(--bg-card);
  padding: 2px 9px;
  border-radius: var(--radius-pill);
}

.res-tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg-card);
  padding: 3px;
  border-radius: var(--radius-sm);
}
.res-tab-btn {
  border: none;
  background: transparent;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-tertiary);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s ease;
}
.res-tab-btn.active { background: var(--accent); color: #FFFFFF; }
.res-tab-btn:hover:not(.active) { color: var(--ink-secondary); }

.resource-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.res-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.15s ease;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.res-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.res-card.completed { opacity: 0.7; }
.res-card.completed .res-title { text-decoration: line-through; color: var(--ink-tertiary); }
.res-card::before {
  content: "";
  position: absolute;
  left: 16px; top: 0;
  width: 34px; height: 4px;
  border-radius: 0 0 4px 4px;
}
.res-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.res-title-wrap { display: flex; align-items: flex-start; gap: 8px; flex: 1; }
.res-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 2px solid var(--ink-faint);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  margin-top: 2px;
  transition: all 0.12s ease;
}
.res-check.checked { background: var(--green); border-color: var(--green); }
.res-check svg { width: 11px; height: 11px; color: #1D1D1F; opacity: 0; }
.res-check.checked svg { opacity: 1; }
.res-title { font-size: 13px; font-weight: 600; line-height: 1.4; flex: 1; }
.res-tool-btn { background: none; border: none; cursor: pointer; color: var(--ink-tertiary); font-size: 12px; padding: 2px 6px; border-radius: 4px; }
.res-tool-btn:hover { color: var(--ink); background: var(--bg-card-hover); }
.res-tool-btn.delete:hover { color: #1D1D1F; }
.res-path {
  font-size: 11px;
  color: var(--ink-tertiary);
  background: var(--bg-elev);
  padding: 6px 8px;
  border-radius: 6px;
  font-family: 'SF Mono', monospace;
  word-break: break-all;
  line-height: 1.4;
}
.res-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.pill-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  background: var(--bg-elev);
  color: var(--ink-secondary);
}
.res-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}
.res-date { font-size: 10px; color: var(--ink-tertiary); }

/* Exercise cards */
.exercise-list { display: flex; flex-direction: column; gap: 10px; }
.ex-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.15s ease;
}
.ex-card:hover { border-color: var(--ink-faint); }
.ex-card.pinned { border-color: #999; }
.ex-row { display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
.ex-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 2px solid var(--ink-faint);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s ease;
}
.ex-check.checked { background: var(--accent); border-color: var(--accent); }
.ex-check svg { width: 11px; height: 11px; color: #1D1D1F; opacity: 0; }
.ex-check.checked svg { opacity: 1; }
.ex-body { flex: 1; min-width: 0; }
.ex-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.ex-title { font-size: 13px; font-weight: 600; }
.ex-card.completed .ex-title { color: var(--ink-tertiary); text-decoration: line-through; }
.ex-meta { font-size: 11px; color: var(--ink-tertiary); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
.ex-subject-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: var(--radius-pill);
  flex-shrink: 0;
}
.ex-status {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  flex-shrink: 0;
}
.ex-status.pending { background: rgba(0,0,0,0.03); color: #BBB; }
.ex-status.completed { background: rgba(0,0,0,0.05); color: #1D1D1F; }
.ex-tool-btn { background: none; border: none; cursor: pointer; color: var(--ink-tertiary); font-size: 13px; padding: 4px 6px; border-radius: 4px; flex-shrink: 0; }
.ex-tool-btn:hover { color: var(--ink); background: var(--bg-card-hover); }
.ex-tool-btn.pin.active { color: #1D1D1F; }
.ex-tool-btn.delete:hover { color: #1D1D1F; }

.priority-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
}
.priority-high { background: rgba(0,0,0,0.06); color: #1D1D1F; }
.priority-medium { background: rgba(0,0,0,0.04); color: #BBB; }
.priority-low { background: rgba(0,0,0,0.02); color: #888; }

.subtasks-area {
  background: var(--bg-elev);
  border-top: 1px solid var(--line);
  padding: 10px 16px 12px 46px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.subtask-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 12px;
  color: var(--ink-secondary);
}
.subtask-left { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
.st-check {
  width: 15px; height: 15px;
  border-radius: 4px;
  border: 1.5px solid var(--ink-faint);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.st-check.checked { background: var(--ink-secondary); border-color: var(--ink-secondary); }
.st-check svg { width: 9px; height: 9px; color: var(--bg); opacity: 0; }
.st-check.checked svg { opacity: 1; }
.st-text.checked { text-decoration: line-through; color: var(--ink-tertiary); }
.st-due { font-size: 10px; color: #BBB; background: rgba(0,0,0,0.03); padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.st-due.overdue { color: #1D1D1F; background: rgba(0,0,0,0.06); }

.drag-handle {
  cursor: grab;
  color: var(--ink-faint);
  font-size: 15px;
  padding: 4px 8px;
  user-select: none;
  display: inline-flex;
  align-items: center;
  border-radius: 4px;
  transition: all 0.12s ease;
}
.drag-handle:hover { color: var(--ink); background: var(--bg-card-hover); }

/* Score breakdown */
.score-overview-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.score-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  transition: all 0.15s ease;
  cursor: pointer;
}
.score-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.score-card-title {
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.score-numbers { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
.score-curr { font-size: 28px; font-weight: 800; }
.score-max { font-size: 13px; color: var(--ink-tertiary); }
.score-target-pill {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink);
  background: rgba(0,0,0,0.03);
  padding: 2px 8px;
  border-radius: 6px;
}
.score-note-box {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  line-height: 1.6;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--ink-secondary);
  user-select: text;
}
.inline-highlight {
  background: rgba(0,0,0,0.08);
  color: #1D1D1F;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
  cursor: pointer;
}
.score-module-list {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);

function srsIntervalMs(box) { return SRS_INTERVALS_DAY[Math.min(Math.max(box,0), SRS_INTERVALS_DAY.length-1)] * 86400000; }
function ensureSrs(obj) {
  if (typeof obj.srsBox !== 'number') obj.srsBox = 0;
  if (typeof obj.srsNext !== 'number') obj.srsNext = Date.now();
  if (typeof obj.srsReviews !== 'number') obj.srsReviews = 0;
  if (typeof obj.srsLapses !== 'number') obj.srsLapses = 0;
}
function srsGrade(obj, result) {
  ensureSrs(obj);
  if (result === 'again') { obj.srsBox = 0; obj.srsLapses = (obj.srsLapses||0)+1; }
  else if (result === 'hard') { obj.srsBox = Math.max(0, obj.srsBox); }

  else if (result === 'easy') { obj.srsBox = Math.min(SRS_INTERVALS_DAY.length-1, obj.srsBox+2); }
  obj.srsReviews = (obj.srsReviews||0)+1;
  obj.srsNext = Date.now() + Math.max(srsIntervalMs(obj.srsBox), result==='hard'?86400000:0);
}

  try {
    const json = JSON.stringify(quizState);
    localStorage.setItem(QUIZ_STORE_KEY, json);
    try { localStorage.setItem(QUIZ_BACKUP_KEY, json); } catch(_){}
  } catch(e) { toast('Quiz save failed: '+e.message); }
}
function loadQuiz() {
  try {
    let raw = localStorage.getItem(QUIZ_STORE_KEY);
    if (!raw) { const bak = localStorage.getItem(QUIZ_BACKUP_KEY); if(bak) raw = bak; }
    if (raw) {
      let parsed = JSON.parse(raw);
      parsed = migrateQuiz(parsed);
      quizState = Object.assign(quizState, parsed);
      quizState.activeQIndex = quizState.activeQIndex || {grammar:{},vocab:{}};
      quizState.answerLog = quizState.answerLog || {};
      quizState.wrongBook = quizState.wrongBook || [];
      quizState.highlights = quizState.highlights || [];
      quizState.vocabularyBook = quizState.vocabularyBook || [];
      quizState.synonymLibrary = quizState.synonymLibrary || [];
      quizState.quizSets = quizState.quizSets || [];
      quizState.currentQuizSetId = quizState.currentQuizSetId || {};
      quizState.activeQuizSetIds = quizState.activeQuizSetIds || {};
    }
  } catch(e) { console.error('Quiz load failed', e); }
}

function migrateQuiz(parsed) {
  const v = parsed.schemaVersion || 1;
  if (v < 5) {
    (parsed.vocabularyBook||[]).forEach(w => { ensureSrs(w); });
    (parsed.synonymLibrary||[]).forEach(g => { ensureSrs(g); });
  }
  if (v < 4) {
    parsed.quizSets = Array.isArray(parsed.quizSets) ? parsed.quizSets : [];
    parsed.currentQuizSetId = parsed.currentQuizSetId || {};
    (parsed.passages||[]).forEach(p => {
      if (!p.id) return;
      if (!parsed.quizSets.find(qs => qs.passageId === p.id)) {
        parsed.quizSets.push({ id:'qs_'+p.id+'_default', passageId:p.id, name:'1', createdAt:Date.now() });
      }
    });
    ['grammarQuestions','vocabularyQuestions'].forEach(k => {
      (parsed[k]||[]).forEach(q => {
        if (!q.quizSetId) {
          const def = parsed.quizSets.find(qs => qs.passageId === q.passageId);
          if (def) q.quizSetId = def.id;
        }
      });
    });
  }
  parsed.schemaVersion = QUIZ_SCHEMA;
  return parsed;
}

function uid(prefix='id') { return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function parseInlineHighlight(subj, str) {
  const escaped = esc(str);
  return escaped.replace(/==([^=]+)==/g, (m,p1) => `<span class="inline-highlight" onclick="removeInlineHighlight('${subj}','${esc(p1).replace(/'/g,"\\'")}')">${p1}</span>`);
}
function removeInlineHighlight(subj, word) {
  const sc = subjectScores[subj]; if(!sc||!sc.note) return;
  sc.note = sc.note.replace(`==${word}==`, word);
  saveResState(); render();
}
function matchesSearch(text, q) { if(!q) return true; return text.toLowerCase().includes(q.toLowerCase()); }

// ================================================================
//  PROGRESS
// ================================================================
function getSubjectProgress(subject) {
  const subEx = exercises.filter(e => !subject || e.subject === subject);
  let total = 0, done = 0;
  subEx.forEach(ex => {
    const sts = ex.subtasks || [];
    if (sts.length > 0) { total += sts.length; done += sts.filter(s=>s.completed).length; }
    else { total += 1; if(ex.status==='completed') done += 1; }
  });
  return { total, done, percent: total===0?0:Math.round(done/total*100) };
}

function renderGlobalSearch() {
  const q = appState.searchQuery;
  // Search across: quizzes, vocabulary, resources, notes, links, exercises
  const matchedPassages = quizState.passages.filter(p => matchesSearch(p.customName||'',q) || matchesSearch(p.title||'',q) || matchesSearch(p.content||'',q));
  const matchedGQ = quizState.grammarQuestions.filter(x => matchesSearch(x.question,q) || (x.options||[]).some(o=>matchesSearch(o,q)));
  const matchedVQ = quizState.vocabularyQuestions.filter(x => matchesSearch(x.question,q) || matchesSearch(x.synonymGroup||'',q));
  const matchedVocab = quizState.vocabularyBook.filter(v => matchesSearch(v.word,q) || matchesSearch(v.meaning||'',q));
  const matchedResources = resources.filter(r => matchesSearch(r.title,q) || matchesSearch(r.path||'',q) || (r.tags||[]).some(t=>matchesSearch(t,q)));
  const matchedExercises = exercises.filter(e => matchesSearch(e.title,q) || (e.subtasks||[]).some(s=>matchesSearch(s.title,q)));
  const matchedLinks = (studySuggest.links||[]).filter(l => matchesSearch(l.title,q) || matchesSearch(l.url||'',q) || matchesSearch(l.description||'',q));

  let html = `<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Search: "${esc(q)}"</h2>`;

  if (matchedPassages.length) html += `<div class="res-section"><div class="res-section-head"><h3>Passages <span class="count-pill">${matchedPassages.length}</span></h3></div><div>${matchedPassages.map(p=>`<div class="list-item"><h4>${esc(p.customName)}</h4><div class="meta">${esc((p.content||'').slice(0,120))}...</div></div>`).join('')}</div></div>`;
  if (matchedGQ.length) html += `<div class="res-section"><div class="res-section-head"><h3>Grammar Questions <span class="count-pill">${matchedGQ.length}</span></h3></div><div>${matchedGQ.slice(0,10).map(q=>`<div class="list-item"><h4>${esc(q.question.slice(0,100))}</h4><div class="meta">Answer: ${esc(q.answer)}</div></div>`).join('')}</div></div>`;
  if (matchedVQ.length) html += `<div class="res-section"><div class="res-section-head"><h3>Vocab Questions <span class="count-pill">${matchedVQ.length}</span></h3></div><div>${matchedVQ.slice(0,10).map(q=>`<div class="list-item"><h4>${esc(q.question.slice(0,100))}</h4><div class="meta">${esc(q.synonymGroup||'')}</div></div>`).join('')}</div></div>`;
  if (matchedVocab.length) html += `<div class="res-section"><div class="res-section-head"><h3>Vocabulary <span class="count-pill">${matchedVocab.length}</span></h3></div><div>${matchedVocab.map(v=>`<div class="list-item"><h4>${esc(v.word)}</h4><div class="meta">${esc(v.meaning||'')}</div></div>`).join('')}</div></div>`;
  if (matchedResources.length) html += `<div class="res-section"><div class="res-section-head"><h3>Resources <span class="count-pill">${matchedResources.length}</span></h3></div><div class="resource-grid">${matchedResources.map(r=>resourceCard(r)).join('')}</div></div>`;
  if (matchedExercises.length) html += `<div class="res-section"><div class="res-section-head"><h3>Exercises <span class="count-pill">${matchedExercises.length}</span></h3></div><div class="exercise-list">${matchedExercises.map(e=>exerciseCard(e)).join('')}</div></div>`;
  if (matchedLinks.length) html += `<div class="res-section"><div class="res-section-head"><h3>Links <span class="count-pill">${matchedLinks.length}</span></h3></div><div>${matchedLinks.map(l=>`<div class="link-card"><div class="link-info"><div class="link-title">${esc(l.title)}</div><div class="link-url">${esc(l.url)}</div></div></div>`).join('')}</div></div>`;

  const total = matchedPassages.length+matchedGQ.length+matchedVQ.length+matchedVocab.length+matchedResources.length+matchedExercises.length+matchedLinks.length;
  if (!total) html += `<div class="empty-state">No results found for "${esc(q)}"</div>`;
  return html;
}

function normalizePassages() { quizState.passages.forEach((p,i) => { if(!p.id) p.id=uid('sec'); if(!p.customName) p.customName = p.title || ('Section '+(i+1)); }); }
function currentPassage() { return quizState.passages.find(p=>p.id===quizState.currentPassageId) || null; }

function renderSectionPillsHTML() {
  return quizState.passages.map(p => {
    const active = p.id === quizState.currentPassageId;
    return `<div class="pill ${active?'active':''}" title="${esc(p.customName)}">
      <span onclick="switchSection('${p.id}')" style="cursor:pointer">${esc(p.customName)}</span>
      <span class="pill-act" onclick="event.stopPropagation();renamePassage('${p.id}')">/</span>
      <span class="pill-act" onclick="event.stopPropagation();deletePassage('${p.id}')">×</span>
    </div>`;
  }).join('') + `<div class="pill add" onclick="addPassage()">+ New Section</div>`;
}

function switchSection(id) { quizState.currentPassageId = id; saveQuiz(); render(); }
function addPassage() {
  const name = prompt('Section name:');
  if (!name || !name.trim()) return;
  const p = { id:uid('sec'), customName:name.trim(), title:'', content:'' };
  quizState.passages.push(p);
  quizState.currentPassageId = p.id;
  saveQuiz(); render();
}
function renamePassage(id) {
  const p = quizState.passages.find(x=>x.id===id); if(!p) return;
  const name = prompt('Rename section:', p.customName);
  if (name===null) return;
  if (!name.trim()) { toast('Name cannot be empty'); return; }
  p.customName = name.trim(); saveQuiz(); render();
}
function deletePassage(id) {
  const p = quizState.passages.find(x=>x.id===id); if(!p) return;
  if (!confirm('Delete section "'+p.customName+'"? This removes all associated questions, highlights, and records.')) return;
  const gIds = quizState.grammarQuestions.filter(q=>q.passageId===id).map(q=>q.id);
  const vIds = quizState.vocabularyQuestions.filter(q=>q.passageId===id).map(q=>q.id);
  const removed = new Set([...gIds,...vIds]);
  quizState.grammarQuestions = quizState.grammarQuestions.filter(q=>q.passageId!==id);
  quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(q=>q.passageId!==id);
  quizState.highlights = quizState.highlights.filter(h=>h.passageId!==id);
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.passageId!==id && !removed.has(w.qId));
  quizState.quizSets = quizState.quizSets.filter(qs=>qs.passageId!==id);
  Object.keys(quizState.answerLog).forEach(k=>{ if(removed.has(k)) delete quizState.answerLog[k]; });
  const idx = quizState.passages.findIndex(x=>x.id===id);
  quizState.passages.splice(idx,1);
  quizState.currentPassageId = quizState.passages.length ? quizState.passages[Math.max(0,Math.min(idx,quizState.passages.length-1))].id : null;
  saveQuiz(); render();
}

// QuizSets
function getQuizSets(pid) { return quizState.quizSets.filter(qs=>qs.passageId===pid); }
function ensureDefaultQuizSet(pid) {
  const list = getQuizSets(pid);
  if (!list.length) { const qs = {id:uid('qs'),passageId:pid,name:'1',createdAt:Date.now()}; quizState.quizSets.push(qs); return qs; }
  return list[0];
}
function currentQuizSet() {
  const p = currentPassage(); if(!p) return null;
  const list = getQuizSets(p.id); if(!list.length) return ensureDefaultQuizSet(p.id);
  return list.find(x=>x.id===quizState.currentQuizSetId[p.id]) || list[0];
}
function getActiveQuizSetIds() {
  const p = currentPassage(); if(!p) return [];
  const list = getQuizSets(p.id); if(!list.length) return [];
  const stored = quizState.activeQuizSetIds[p.id];
  if (Array.isArray(stored) && stored.length) { const v = stored.filter(id=>list.some(x=>x.id===id)); if(v.length) return v; }
  const single = list.find(x=>x.id===quizState.currentQuizSetId[p.id]);
  return [single?.id || list[0].id];
}
function setActiveQuizSetIds(ids) {
  const p = currentPassage(); if(!p) return;
  quizState.activeQuizSetIds[p.id] = ids.slice();
  if (ids.length===1) quizState.currentQuizSetId[p.id] = ids[0];
  saveQuiz(); render();
}

function renderSectionTitleBarHTML() {
  const p = currentPassage();
  if (!p) return `<div style="font-size:14px;color:var(--ink-tertiary);margin-bottom:16px;">No sections. Click "+ New Section" or import JSON.</div>`;
  const sets = getQuizSets(p.id);
  if (!sets.length) ensureDefaultQuizSet(p.id);
  const allSets = getQuizSets(p.id);
  const activeIds = getActiveQuizSetIds();
  const curVal = activeIds.length===allSets.length && allSets.length>1 ? '__all__' : (activeIds[0]||'');
  const opts = [`<option value="__all__" ${curVal==='__all__'?'selected':''}>All Sets (${allSets.length})</option>`,
    ...allSets.map(qs => {
      const gc = quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).length;
      const vc = quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).length;
      return `<option value="${esc(qs.id)}" ${curVal===qs.id?'selected':''}>${esc(qs.name)} (${gc+vc})</option>`;
    })].join('');

  return `<div style="margin-bottom:12px;">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:4px;" contenteditable="true" id="passageTitleEditable" onblur="savePassageTitle()">${esc(p.title||p.customName)}</h2>
    <div style="font-size:11px;color:var(--ink-tertiary);margin-bottom:8px;">Section: ${esc(p.customName)}</div>
    <div class="quizset-bar">
      <label>Quiz Set:</label>
      <select onchange="onQuizSetChange(this.value)">${opts}</select>
      <button class="apple-btn small" onclick="addQuizSet()">+ New</button>
      <button class="apple-btn small" onclick="renameCurrentQS()" ${curVal==='__all__'||!curVal?'disabled':''}>Rename</button>
      <button class="apple-btn small danger" onclick="deleteCurrentQS()" ${curVal==='__all__'||!curVal?'disabled':''}>Delete</button>
    </div>
  </div>`;
}

function savePassageTitle() {
  const el = document.getElementById('passageTitleEditable');
  if (!el) return;
  const p = currentPassage(); if(!p) return;
  const newTitle = (el.textContent||'').trim();
  if (newTitle) { p.title = newTitle; saveQuiz(); }
}
function onQuizSetChange(val) {
  const allSets = getQuizSets(currentPassage()?.id);
  if (val==='__all__') setActiveQuizSetIds(allSets.map(qs=>qs.id));
  else if (val) setActiveQuizSetIds([val]);
}
function addQuizSet() {
  const p = currentPassage(); if(!p) { toast('Create a section first'); return; }
  const list = getQuizSets(p.id);
  const name = prompt('Quiz set name:', String(list.length+1));
  if (name===null) return;
  const qs = {id:uid('qs'),passageId:p.id,name:(name||'').trim()||String(list.length+1),createdAt:Date.now()};
  quizState.quizSets.push(qs); quizState.currentQuizSetId[p.id]=qs.id;
  saveQuiz(); render();
}
function renameCurrentQS() {
  const ids = getActiveQuizSetIds(); if(!ids.length) return;
  const qs = quizState.quizSets.find(x=>x.id===ids[0]); if(!qs) return;
  const name = prompt('Rename:', qs.name); if(name===null) return;
  if(!name.trim()){toast('Empty');return;} qs.name=name.trim(); saveQuiz(); render();
}
function deleteCurrentQS() {
  const ids = getActiveQuizSetIds(); if(!ids.length) return;
  const qs = quizState.quizSets.find(x=>x.id===ids[0]); if(!qs) return;
  const gc = quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).length;
  const vc = quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).length;
  if(!confirm(`Delete "${qs.name}"? Removes ${gc+vc} questions.`)) return;
  const removed = new Set([...quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).map(q=>q.id),...quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).map(q=>q.id)]);
  quizState.grammarQuestions = quizState.grammarQuestions.filter(q=>q.quizSetId!==qs.id);
  quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(q=>q.quizSetId!==qs.id);
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.quizSetId!==qs.id && !removed.has(w.qId));
  Object.keys(quizState.answerLog).forEach(k=>{if(removed.has(k))delete quizState.answerLog[k];});
  quizState.quizSets = quizState.quizSets.filter(x=>x.id!==qs.id);
  const p = currentPassage();
  if(p){const list=getQuizSets(p.id); quizState.currentQuizSetId[p.id]=list[0]?.id||null;}
  saveQuiz(); render();
}

function renderQuestionsHTML() {
  const p = currentPassage();
  if (!p) return `<div class="empty-state">No section selected</div>`;
  const activeIds = getActiveQuizSetIds();
  const activeSet = new Set(activeIds);
  const isGrammar = quizState.activeTab === 'grammar';
  const pool = isGrammar
    ? quizState.grammarQuestions.filter(q=>q.passageId===p.id && activeSet.has(q.quizSetId))
    : quizState.vocabularyQuestions.filter(q=>q.passageId===p.id && activeSet.has(q.quizSetId));

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div style="font-size:12px;color:var(--ink-tertiary)">${pool.length} questions</div>
    <button class="apple-btn" onclick="openQuestionEditor(null,'${isGrammar?'grammar':'vocab'}')">+ Add Question</button>
  </div>`;

  if (!pool.length) {
    html += `<div class="empty-state">No questions in this set. Click "+ Add Question" or import JSON.</div>`;
    return html;
  }

  pool.forEach((q,i) => { html += renderQuestionCard(q, i+1, isGrammar?'grammar':'vocab'); });
  return html;
}

function renderQuestionCard(q, num, qType) {
  const log = quizState.answerLog[q.id];
  let html = `<div class="q-card" data-qid="${q.id}">
    <div class="q-meta">Q${num} · ${qType.toUpperCase()}${q.synonymGroup?' · '+esc(q.synonymGroup):''}</div>
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <button class="q-tool-btn" onclick="openAddVocabDialog('${esc(q.question).replace(/'/g,"\\'")}')">+ Vocab</button>
      <button class="q-tool-btn" onclick="openAddSynonymDialog('${q.id}')">Syn Synonyms</button>
    </div>
    <div class="q-text">${esc(q.question)}</div>
    <div class="q-options">`;

  q.options.forEach(opt => {
    const letter = (opt.match(/^([A-Z])[.\s、)]/) || [])[1] || opt[0];
    let cls = 'q-opt';
    if (log) { if(letter===q.answer) cls+=' correct'; else if(letter===log.chosen) cls+=' wrong'; }
    html += `<button class="${cls}" onclick="selectOption(this,'${letter}','${q.id}')">${esc(opt)}</button>`;
  });
  html += `</div>`;

  if (log) {
    html += `<div class="q-status ${log.correct?'ok':'err'}">${log.correct?'OK Correct':'X Wrong · Answer: '+esc(q.answer)}</div>`;
    html += `<div class="q-explain show">${esc(q.explanation||'')}</div>`;
  }

  html += `<div class="q-actions">
    <button class="primary" onclick="submitAnswer('${q.id}','${qType}')">Submit</button>
    <button onclick="showAnswer('${q.id}')">Show Answer</button>
    <button onclick="openQuestionEditor('${q.id}','${qType}')">Edit</button>
    <button onclick="deleteQuestion('${q.id}','${qType}')">Delete</button>
  </div></div>`;
  return html;
}

function selectOption(btn, letter, qId) {
  const card = btn.closest('.q-card');
  card.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  card._chosen = letter;
}

function submitAnswer(qId, qType) {
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`);
  const chosen = card?._chosen;
  if (!chosen) { toast('Select an option first'); return; }
  const pool = qType==='grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
  const q = pool.find(x=>x.id===qId); if(!q) return;
  const correct = chosen === q.answer;
  quizState.answerLog[qId] = { correct, chosen, ts: Date.now() };
  if (!correct) {
    quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
    quizState.wrongBook.push({id:uid('wb'),qType,qId,passageId:q.passageId,quizSetId:q.quizSetId||null,question:q.question,options:q.options,correctAnswer:q.answer,yourAnswer:chosen,explanation:q.explanation||'',ts:Date.now()});
  } else {
    quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
  }
  saveQuiz(); render();
}

function showAnswer(qId) {
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`);
  if (!card) return;
  const q = [...quizState.grammarQuestions,...quizState.vocabularyQuestions].find(x=>x.id===qId);
  if (!q) return;
  card.querySelectorAll('.q-opt').forEach(o => {
    const letter = (o.textContent.match(/^([A-Z])/) || [])[1];
    if (letter===q.answer) o.classList.add('correct');
  });
  const expEl = card.querySelector('.q-explain');
  if (expEl) { expEl.textContent = q.explanation||''; expEl.classList.add('show'); }
}

function deleteQuestion(qId, qType) {
  if (!confirm('Delete this question?')) return;
  if (qType==='grammar') quizState.grammarQuestions = quizState.grammarQuestions.filter(x=>x.id!==qId);
  else quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(x=>x.id!==qId);
  delete quizState.answerLog[qId];
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
  saveQuiz(); render();
}

// Question Editor
function openQuestionEditor(qId, qType) {
  const isNew = !qId;
  const p = currentPassage();
  const cur = currentQuizSet();
  let q;
  if (qId) {
    const pool = qType==='grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
    q = pool.find(x=>x.id===qId);
    if (!q) return;
    q = {...q, options:[...q.options]};
  } else {
    q = {id:uid(qType==='grammar'?'g':'v'),passageId:p?.id,quizSetId:cur?.id,question:'',options:['A. ','B. ','C. ','D. '],answer:'A',explanation:'',synonymGroup:''};
  }

  const optsHTML = q.options.map((o,i) => `<div class="field"><label>Option ${String.fromCharCode(65+i)}</label><input class="qopt" value="${esc(o)}" /></div>`).join('');
  const synHTML = qType==='vocab' ? `<div class="field"><label>Synonym Group</label><input id="qSyn" value="${esc(q.synonymGroup||'')}" /></div>` : '';

  openGenericSheet((isNew?'Add':'Edit')+' '+(qType==='grammar'?'Grammar':'Vocab')+' Question', `
    <div class="field"><label>Question</label><textarea id="qText">${esc(q.question)}</textarea></div>
    ${synHTML}${optsHTML}
    <div class="field"><label>Answer (A/B/C/D)</label><input id="qAns" value="${esc(q.answer)}" /></div>
    <div class="field"><label>Explanation</label><textarea id="qExp">${esc(q.explanation||'')}</textarea></div>
  `, [
    {text:'Cancel', onclick:()=>closeSheet('genericSheet')},
    {text:'Save', cls:'primary', onclick:()=>{
      q.question = document.getElementById('qText').value.trim();
      q.options = Array.from(document.querySelectorAll('.qopt')).map(i=>i.value.trim()).filter(Boolean);
      q.answer = document.getElementById('qAns').value.trim().toUpperCase();
      q.explanation = document.getElementById('qExp').value.trim();
      if(qType==='vocab') q.synonymGroup = (document.getElementById('qSyn')?.value||'').trim();
      if(!q.question || q.options.length<2) { toast('Incomplete'); return; }
      if(isNew) {
        if(qType==='grammar') quizState.grammarQuestions.push(q);
        else quizState.vocabularyQuestions.push(q);
      } else {
        const pool = qType==='grammar'?quizState.grammarQuestions:quizState.vocabularyQuestions;
        const idx = pool.findIndex(x=>x.id===q.id);
        if(idx>=0) pool[idx] = q;
      }
      saveQuiz(); closeSheet('genericSheet'); render();
    }}
  ]);
}

let replacementMap = {};
function buildReadingHTML(content, hls) {
  const re = /[A-Za-z]+(?:[''][A-Za-z]+)?|\s+|[^A-Za-z\s]+/g;
  const tokens = [];
  let m;
  while((m=re.exec(content))!==null) tokens.push({text:m[0],start:m.index,end:m.index+m[0].length});
  const parts = tokens.map(t => {
    const isWord = /^[A-Za-z]/.test(t.text);
    if(isWord){const key=t.text.toLowerCase();const rep=replacementMap[key];const dt=rep||t.text;return{html:`<span class="word${rep?' replaced':''}" data-word="${esc(t.text)}" data-start="${t.start}" data-end="${t.end}">${esc(dt)}</span>`,start:t.start,end:t.end};}
    return{html:esc(t.text),start:t.start,end:t.end};
  });
  let html='';
  for(const part of parts){
    const activeH = hls.find(h=>{const s=h.charStart??-1;const e=h.charEnd??-1;return s>=0&&e>=0&&part.start>=s&&part.end<=e;});
    if(activeH){const cls="hl hl-"+(activeH.highlightColor||"yellow")+(activeH.note?" has-note":"");html+=`<span class="${cls}" data-hid="${esc(activeH.id)}">${part.html}</span>`;}
    else html+=part.html;
  }
  return html;
}

function bindReadingEvents() {
  const body = document.getElementById('readingBody');
  if (!body) return;
  body.querySelectorAll('.word').forEach(w => {
    w.addEventListener('click', e => {
      const sel = window.getSelection();
      if(sel && sel.toString().trim().length>1) return;
      showWordPopup(w, e);
    });
  });
  body.querySelectorAll('.hl').forEach(h => {
    h.addEventListener('click', e => { e.stopPropagation(); openHighlightEditor(h.dataset.hid); });
  });

  // Selection menu
  body.addEventListener('mouseup', handleReadingSelection);
}

function handleReadingSelection() {
  const sel = window.getSelection();
  const menu = document.getElementById('selMenu');
  if(!sel||sel.rangeCount===0||sel.isCollapsed){menu.style.display='none';return;}
  const text = sel.toString().trim();
  if(!text){menu.style.display='none';return;}
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  if(rect.width===0){menu.style.display='none';return;}
  menu.style.display='flex';
  const w = menu.offsetWidth||300;
  let left = rect.left+rect.width/2-w/2;
  let top = rect.top-menu.offsetHeight-8;
  if(top<8) top=rect.bottom+8;
  left = Math.max(8,Math.min(left,window.innerWidth-w-8));
  menu.style.left=left+'px'; menu.style.top=top+'px';
  menu._selInfo = getSelectionOffsetInReading(range);
  menu._selText = text;
}

function getSelectionOffsetInReading(range) {
  const body = document.getElementById('readingBody');
  if(!body) return null;
  function findOff(node, isStart, offInNode) {
    let el = node.nodeType===1?node:node.parentElement;
    while(el&&el!==body&&!el.dataset?.start) el=el.parentElement;
    if(el?.dataset?.start!=null){const s=+el.dataset.start;const e=+el.dataset.end;return isStart?s:e;}
    return null;
  }
  const s=findOff(range.startContainer,true,range.startOffset);
  const e=findOff(range.endContainer,false,range.endOffset);
  if(s==null||e==null) return null;
  return{start:Math.min(s,e),end:Math.max(s,e)};
}

document.getElementById('selMenu').addEventListener('click', e => {
  const btn = e.target.closest('button'); if(!btn) return;
  const menu = document.getElementById('selMenu');
  const info = menu._selInfo; const text = menu._selText;
  if(!info||!text){menu.style.display='none';return;}
  const p = currentPassage(); if(!p){menu.style.display='none';return;}
  if(btn.dataset.color) addHighlight(p.id,info.start,info.end,text,btn.dataset.color,'');
  else if(btn.dataset.act==='note'){const note=prompt('Note:','');if(note!==null)addHighlight(p.id,info.start,info.end,text,'yellow',note.trim());}
  else if(btn.dataset.act==='vocab') addToVocabBook(text.trim());
  menu.style.display='none'; window.getSelection().removeAllRanges();
});

function addHighlight(pid,start,end,text,color,note){
  quizState.highlights.push({id:uid('hl'),passageId:pid,charStart:start,charEnd:end,selectedText:text,highlightColor:color,note:note||'',timestamp:Date.now()});
  saveQuiz(); render();
}

function openHighlightEditor(hid) {

    <div class="field"><label>Color</label><select id="hlColor"><option value="yellow"${h.highlightColor==='yellow'?' selected':''}>Yellow</option><option value="blue"${h.highlightColor==='blue'?' selected':''}>Blue</option><option value="pink"${h.highlightColor==='pink'?' selected':''}>Pink</option></select></div>

function showWordPopup(wordEl) {
  const word = wordEl.dataset.word; const wl = word.toLowerCase();
  const pop = document.getElementById('wordPop');
  const groups = quizState.synonymLibrary.filter(g=>(g.words||[]).some(w=>w.toLowerCase()===wl));
  const inVocab = quizState.vocabularyBook.find(v=>v.word.toLowerCase()===wl);
  let html = `<h4>${esc(word)}</h4>`;
  if(groups.length){groups.forEach(g=>{const others=g.words.filter(w=>w.toLowerCase()!==wl);html+=`<div style="margin-bottom:6px"><div style="font-size:10px;color:var(--ink-tertiary);margin-bottom:4px">${esc(g.groupName||'Synonyms')}</div><div class="syn-list">${others.map(s=>`<span class="syn-chip" onclick="replaceWord('${wl}','${esc(s)}')">${esc(s)}</span>`).join('')}</div></div>`;});}
  else html+=`<div style="font-size:11px;color:var(--ink-tertiary);margin-bottom:6px">No synonym groups found.</div>`;
  html+=`<div class="pop-actions"><button onclick="delete replacementMap['${wl}'];document.getElementById('wordPop').style.display='none';render();">Reset</button><button onclick="addToVocabBook('${esc(word)}');document.getElementById('wordPop').style.display='none';">${inVocab?'In Vocab':'+ Vocab'}</button></div>`;
  pop.innerHTML=html; pop.style.display='block';
  const rect=wordEl.getBoundingClientRect();
  pop.style.left=rect.left+'px'; pop.style.top=(rect.bottom+6)+'px';
}
function replaceWord(wl, rep) { replacementMap[wl]=rep; document.getElementById('wordPop').style.display='none'; render(); toast('Replaced with '+rep); }

document.addEventListener('mousedown', e => {
  const sel = document.getElementById('selMenu');
  if(sel.style.display!=='none'&&!sel.contains(e.target)&&!e.target.closest('#readingBody')) sel.style.display='none';
  const wp = document.getElementById('wordPop');
  if(wp.style.display!=='none'&&!wp.contains(e.target)&&!e.target.classList.contains('word')) wp.style.display='none';
});

function addToVocabBook(word, extra={}) {
  word = (word||'').trim(); if(!word) return false;
  const exists = quizState.vocabularyBook.find(v=>v.word.toLowerCase()===word.toLowerCase());
  if(exists){toast('Already in vocab: '+word);return false;}
  quizState.vocabularyBook.push({word,meaning:extra.meaning||'',example:extra.example||'',synonyms:extra.synonyms||[],notes:extra.notes||'',addedAt:Date.now(),srsBox:0,srsNext:Date.now(),srsReviews:0,srsLapses:0});
  saveQuiz(); render(); toast('Added to vocab: '+word); return true;
}

function openQuizVocab() {
  quizState.vocabularyBook.forEach(ensureSrs);
  const items = [...quizState.vocabularyBook].sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  const dueCount = srsDueList(quizState.vocabularyBook).length;
  const list = items.length ? items.map(v => {
    const isDue = (v.srsNext||0)<=Date.now();
    return `<div class="list-item" data-w="${esc(v.word)}">
      <h4>${esc(v.word)} <span style="color:var(--ink-tertiary);font-weight:400;font-size:12px">— ${esc(v.meaning||'')}</span></h4>
      <div class="meta">${esc(v.example||'')}</div>
      <div class="chips"><span class="chip">Box ${v.srsBox||0}</span>${isDue?'<span class="chip" style="color:var(--orange)">Due</span>':'<span class="chip" style="color:var(--green)">Next: '+new Date(v.srsNext).toLocaleDateString()+'</span>'}${v.synonyms?.length?v.synonyms.map(s=>`<span class="chip">${esc(s)}</span>`).join(''):''}</div>
      <div class="actions">
        <button onclick="closeSheet('genericSheet');startSrsReview('vocab',[quizState.vocabularyBook.find(x=>x.word==='${esc(v.word)}')])">Review</button>
        <button onclick="editVocabItem('${esc(v.word)}')">Edit</button>
        <button onclick="quizState.vocabularyBook=quizState.vocabularyBook.filter(x=>x.word!=='${esc(v.word)}');saveQuiz();closeSheet('genericSheet');render();">Delete</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state">Vocabulary book is empty</div>`;

  openGenericSheet(`R Vocabulary (${items.length})${dueCount?' · ! '+dueCount+' due':''}`,
    `<div class="field"><input id="vSearch" placeholder="Search..." oninput="filterVocabSearch(this.value)"/></div><div id="vList">${list}</div>`,
    [{text:`Rev Review (${dueCount})`,cls:dueCount?'primary':'',onclick:()=>{closeSheet('genericSheet');startSrsReview('vocab');}},{text:'+ Add',onclick:()=>editVocabItem(null)},{text:'Close',onclick:()=>closeSheet('genericSheet')}]

function editVocabItem(word) {
  const v = word ? quizState.vocabularyBook.find(x=>x.word===word) : {word:'',meaning:'',example:'',synonyms:[],notes:''};
  if(!v) return;
  openGenericSheet(word?'Edit Vocab':'Add Vocab',`

function openAddVocabDialog(prefill) {
  openGenericSheet('+ Add to Vocabulary',`
    <div class="field"><label>Word</label><input id="vwIn" value="${esc(prefill||'')}"/></div>
    <div class="field"><label>Meaning</label><input id="vmIn"/></div>
    <div class="field"><label>Example</label><textarea id="veIn"></textarea></div>
    <div class="field"><label>Synonyms</label><input id="vsIn"/></div>
  `,[
    {text:'Cancel',onclick:()=>closeSheet('genericSheet')},
    {text:'Save',cls:'primary',onclick:()=>{
      const word=document.getElementById('vwIn').value.trim();if(!word){toast('Word required');return;}
      addToVocabBook(word,{meaning:document.getElementById('vmIn').value.trim(),example:document.getElementById('veIn').value.trim(),synonyms:document.getElementById('vsIn').value.split(',').map(s=>s.trim()).filter(Boolean)});

function openAddSynonymDialog(qId) {
  const q = [...quizState.grammarQuestions,...quizState.vocabularyQuestions].find(x=>x.id===qId);
  if(!q) return;
  const cleanOpts = (q.options||[]).map(o=>o.replace(/^[A-Z][.\s、)]\s*/,'').trim()).filter(Boolean);
  openGenericSheet('Syn Add Synonym Group',`
    <div class="field"><label>Group Name</label><input id="sgnIn" value="${esc(q.synonymGroup||'')}"/></div>
    <div class="field"><label>Words</label><textarea id="sgwIn">${esc(cleanOpts.join(', '))}</textarea></div>
    <div class="field"><label>Notes</label><textarea id="sgnnIn">${esc(q.explanation||'')}</textarea></div>
  `,[
    {text:'Cancel',onclick:()=>closeSheet('genericSheet')},
    {text:'Save',cls:'primary',onclick:()=>{
      const name=document.getElementById('sgnIn').value.trim();
      const words=document.getElementById('sgwIn').value.split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
      const notes=document.getElementById('sgnnIn').value.trim();
      if(!name||words.length<2){toast('Need name + 2 words');return;}
      const exists=quizState.synonymLibrary.find(g=>g.groupName===name);
      if(exists){const set=new Set((exists.words||[]).map(w=>w.toLowerCase()));words.forEach(w=>{if(!set.has(w.toLowerCase())){exists.words.push(w);set.add(w.toLowerCase());}});if(notes&&!exists.notes)exists.notes=notes;}
      else quizState.synonymLibrary.push({groupName:name,words,notes,srsBox:0,srsNext:Date.now(),srsReviews:0,srsLapses:0});
      words.forEach(w=>addToVocabBook(w,{example:q.question||'',synonyms:words.filter(x=>x.toLowerCase()!==w.toLowerCase())}));
      saveQuiz();closeSheet('genericSheet');render();toast('Saved to synonyms + vocab');
    }}
  ]);
}

function openQuizWrongBook() {
  const p = currentPassage();
  const all = [...quizState.wrongBook].sort((a,b)=>b.ts-a.ts);
  const filtered = p ? all.filter(w=>w.passageId===p.id) : all;

  const html = filtered.length ? filtered.map(w => `<div class="list-item">
    <div class="chips"><span class="chip" style="color:var(--red)">${w.qType==='grammar'?'Grammar':'Vocab'}</span></div>
    <h4>${esc(w.question)}</h4>
    <div class="meta">Your: ${esc(w.yourAnswer)} · Correct: ${esc(w.correctAnswer)}</div>
    ${w.explanation?`<div class="meta" style="margin-top:4px">${esc(w.explanation)}</div>`:''}
    <div class="actions">
      <button onclick="retryWrong('${w.id}')">Retry</button>
      <button onclick="quizState.wrongBook=quizState.wrongBook.filter(x=>x.id!=='${w.id}');saveQuiz();closeSheet('genericSheet');render();">Delete</button>
    </div>
  </div>`).join('') : `<div class="empty-state">No wrong answers${p?' in current section':''}</div>`;

  openGenericSheet('X Wrong Book ('+filtered.length+')',
    `<div style="display:flex;gap:6px;margin-bottom:12px"><button class="apple-btn small ${!p?'active':''}" onclick="quizState.currentPassageId=null;saveQuiz();closeSheet('genericSheet');openQuizWrongBook();">All</button>${quizState.passages.map(pp=>`<button class="apple-btn small ${pp.id===p?.id?'active':''}" onclick="quizState.currentPassageId='${pp.id}';saveQuiz();closeSheet('genericSheet');openQuizWrongBook();">${esc(pp.customName)}</button>`).join('')}</div>`+html,
    [{text:'Close',cls:'primary',onclick:()=>closeSheet('genericSheet')}]
  );
}

function retryWrong(wId) {
  const w = quizState.wrongBook.find(x=>x.id===wId); if(!w) return;
  quizState.currentPassageId = w.passageId;
  if(w.quizSetId) quizState.currentQuizSetId[w.passageId] = w.quizSetId;
  quizState.activeTab = w.qType==='grammar'?'grammar':'vocab';
  delete quizState.answerLog[w.qId];
  quizState.wrongBook = quizState.wrongBook.filter(x=>x.id!==wId);
  saveQuiz(); closeSheet('genericSheet'); render();
}

let srsSession = null;
function startSrsReview(mode, customList) {
  const source = mode==='vocab' ? quizState.vocabularyBook : quizState.synonymLibrary;
  source.forEach(ensureSrs);
  let queue;
  if(Array.isArray(customList)&&customList.length){customList.forEach(ensureSrs);queue=customList.slice();}
  else{const due=srsDueList(source);if(!due.length){toast('Nothing due! !');return;}queue=due.slice().sort(()=>Math.random()-0.5);}
  srsSession = {mode,queue,total:queue.length,done:0,showAnswer:false};
  renderSrsCard();
}

function renderSrsCard() {
  if(!srsSession||!srsSession.queue.length){
    openGenericSheet('! Review Complete',`<div style="text-align:center;padding:20px;font-size:14px;">Reviewed <b>${srsSession?.total||0}</b> items</div>`,
      [{text:'Close',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
    return;
  }
  const cur=srsSession.queue[0];const isVocab=srsSession.mode==='vocab';
  const frontHTML=isVocab?`<div style="font-size:28px;font-weight:700">${esc(cur.word)}</div>`:`<div style="font-size:22px;font-weight:700">${esc(cur.groupName||'Group')}</div><div style="color:var(--ink-tertiary);font-size:11px;margin-top:4px">${(cur.words||[]).length} words</div>`;
  const backHTML=isVocab?`<div style="font-size:15px;color:var(--ink)">${esc(cur.meaning||'')}</div>${cur.example?`<div style="margin-top:10px;padding:8px 12px;background:var(--bg-card);border-radius:8px;font-size:12px;color:var(--ink-secondary)">${esc(cur.example)}</div>`:''}`:`<div class="chips">${(cur.words||[]).map(w=>`<span class="chip" style="font-size:14px;padding:6px 14px">${esc(w)}</span>`).join('')}</div>`;

  const btnHTML = !srsSession.showAnswer
    ? `<button class="apple-btn primary" style="padding:10px 40px" onclick="srsSession.showAnswer=true;renderSrsCard();">Show Answer</button>`
    : `<div style="display:flex;gap:8px;justify-content:center">
        <button class="apple-btn" style="background:rgba(255,69,58,0.1);color:var(--red)" onclick="srsGradeCurrent('again')">Again</button>
        <button class="apple-btn" style="background:rgba(255,159,10,0.1);color:var(--orange)" onclick="srsGradeCurrent('hard')">Hard</button>
        <button class="apple-btn" style="background:rgba(48,209,88,0.1);color:var(--green)" onclick="srsGradeCurrent('good')">Good</button>
        <button class="apple-btn" style="background:rgba(10,132,255,0.1);color:var(--accent)" onclick="srsGradeCurrent('easy')">Easy</button>
      </div>`;

  openGenericSheet(`Rev Review · ${isVocab?'Vocabulary':'Synonyms'}`,`
    <div style="max-width:500px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-tertiary);margin-bottom:16px"><span>${srsSession.done+1}/${srsSession.total}</span><span>Box ${cur.srsBox||0}</span></div>
      <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center">
        ${frontHTML}
        <div style="width:100%;margin-top:20px;padding-top:20px;border-top:1px dashed var(--line);${srsSession.showAnswer?'':'display:none'}">${backHTML}</div>
      </div>
      <div style="margin-top:20px;text-align:center">${btnHTML}</div>
    </div>
  `,[{text:'End Review',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
}

function srsGradeCurrent(grade) {
  if(!srsSession) return;
  const cur=srsSession.queue.shift();
  srsGrade(cur,grade);
  srsSession.done++;srsSession.showAnswer=false;
  saveQuiz();renderSrsCard();
}

// Keyboard shortcuts for SRS
document.addEventListener('keydown', e => {
  if(!srsSession) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(!srsSession.showAnswer&&(e.code==='Space'||e.key==='Enter')){e.preventDefault();srsSession.showAnswer=true;renderSrsCard();}
  else if(srsSession.showAnswer){const map={1:'again',2:'hard',3:'good',4:'easy'};if(map[e.key]){e.preventDefault();srsGradeCurrent(map[e.key]);}}
});

function exportQuizJSON() {
  const obj = {version:'2.0',schemaVersion:QUIZ_SCHEMA,exportedAt:Date.now(),passages:quizState.passages,quizSets:quizState.quizSets,grammarQuestions:quizState.grammarQuestions,vocabularyQuestions:quizState.vocabularyQuestions,vocabularyBook:quizState.vocabularyBook,synonymLibrary:quizState.synonymLibrary,highlights:quizState.highlights,wrongBook:quizState.wrongBook,answerLog:quizState.answerLog,currentPassageId:quizState.currentPassageId,currentQuizSetId:quizState.currentQuizSetId};
  downloadJSON(obj,'quiz_export_'+todayISO()+'.json');
  toast('Exported OK');
}

function importQuizJSON() {
  if(quizState.passages.length&&!confirm('This will OVERWRITE all quiz data. Continue?')) return;
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { try { importQuizData(JSON.parse(r.result)); toast('Imported OK'); } catch(err) { alert('Import failed: '+err.message); } };
    r.readAsText(f);
  };
  inp.click();
}

function importQuizData(data) {
  if(!data||typeof data!=='object') throw new Error('Invalid JSON');
  const passages = Array.isArray(data.passages)?data.passages:[];
  passages.forEach((p,i)=>{if(!p.id)p.id=uid('sec');if(!p.customName)p.customName=p.title||('Section '+(i+1));if(typeof p.content!=='string')p.content='';});
  quizState.passages=passages;
  quizState.quizSets=Array.isArray(data.quizSets)?data.quizSets:[];
  quizState.grammarQuestions=Array.isArray(data.grammarQuestions)?data.grammarQuestions:[];
  quizState.vocabularyQuestions=Array.isArray(data.vocabularyQuestions)?data.vocabularyQuestions:[];
  quizState.vocabularyBook=Array.isArray(data.vocabularyBook)?data.vocabularyBook:[];
  quizState.synonymLibrary=Array.isArray(data.synonymLibrary)?data.synonymLibrary:[];
  quizState.highlights=Array.isArray(data.highlights)?data.highlights:[];
  quizState.wrongBook=Array.isArray(data.wrongBook)?data.wrongBook:[];
  quizState.answerLog=data.answerLog||{};
  quizState.currentQuizSetId=data.currentQuizSetId||{};
  quizState.currentPassageId=data.currentPassageId||(passages[0]&&passages[0].id)||null;
  quizState.highlights.forEach(h=>{if(!h.id)h.id=uid('hl');});
  quizState.quizSets.forEach(qs=>{if(!qs.id)qs.id=uid('qs');});
  passages.forEach(p=>{if(!quizState.quizSets.some(qs=>qs.passageId===p.id)){quizState.quizSets.push({id:uid('qs'),passageId:p.id,name:'1',createdAt:Date.now()});}});
  saveQuiz(); render();
}

function clearAllQuiz() {
  if(!confirm('Clear ALL quiz data? This cannot be undone.')) return;
  quizState = {version:'2.0',schemaVersion:QUIZ_SCHEMA,passages:[],quizSets:[],grammarQuestions:[],vocabularyQuestions:[],vocabularyBook:[],synonymLibrary:[],highlights:[],wrongBook:[],answerLog:{},currentPassageId:null,currentQuizSetId:{},activeQuizSetIds:{},activeTab:'grammar',activeQIndex:{grammar:{},vocab:{}}};
  saveQuiz(); render();
}

function loadSeedData() {
  if(quizState.passages.length&&!confirm('Merge sample data?')) return;
  const seed = getSeedData();
  seed.passages.forEach(p=>{if(!quizState.passages.find(x=>x.id===p.id))quizState.passages.push(p);});
  seed.grammarQuestions.forEach(q=>{if(!quizState.grammarQuestions.find(x=>x.id===q.id))quizState.grammarQuestions.push(q);});
  seed.vocabularyQuestions.forEach(q=>{if(!quizState.vocabularyQuestions.find(x=>x.id===q.id))quizState.vocabularyQuestions.push(q);});
  seed.vocabularyBook.forEach(v=>{if(!quizState.vocabularyBook.find(x=>x.word===v.word))quizState.vocabularyBook.push(v);});
  seed.synonymLibrary.forEach(g=>{if(!quizState.synonymLibrary.find(x=>x.groupName===g.groupName))quizState.synonymLibrary.push(g);});
  if(!quizState.currentPassageId&&quizState.passages.length) quizState.currentPassageId=quizState.passages[0].id;
  saveQuiz(); render(); toast('Sample data loaded');
}

async function cloudUpload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token){alert('Token required');return;}
  try{
    toast('Uploading...');
    const body={description:'Quiz Backup',public:false,files:{[filename]:{content:JSON.stringify({version:'2.0',schemaVersion:QUIZ_SCHEMA,exportedAt:Date.now(),passages:quizState.passages,quizSets:quizState.quizSets,grammarQuestions:quizState.grammarQuestions,vocabularyQuestions:quizState.vocabularyQuestions,vocabularyBook:quizState.vocabularyBook,synonymLibrary:quizState.synonymLibrary,highlights:quizState.highlights,wrongBook:quizState.wrongBook,answerLog:quizState.answerLog,currentPassageId:quizState.currentPassageId,currentQuizSetId:quizState.currentQuizSetId},null,2)}}};
    let url='https://api.github.com/gists';let method='POST';
    if(gistId){url+='/'+gistId;method='PATCH';}
    const res=await fetch(url,{method,headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    quizMeta.gist={token,gistId:data.id||gistId,filename,lastSyncTs:Date.now()};
    try{localStorage.setItem(QUIZ_META_KEY,JSON.stringify(quizMeta));}catch(_){}
    toast('OK Uploaded');
  }catch(e){alert('Upload failed: '+e.message);}
}

async function cloudDownload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token||!gistId){alert('Token and Gist ID required');return;}
  if(!confirm('Overwrite local data with cloud?')) return;
  try{
    toast('Downloading...');
    const res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token}});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    const file=data.files?.[filename]||Object.values(data.files||{})[0];
    if(!file?.content) throw new Error('No data file');
    importQuizData(JSON.parse(file.content));
    toast('OK Downloaded');closeSheet('genericSheet');
  }catch(e){alert('Download failed: '+e.message);}
}

          <div class="sb-score-box"><div class="sb-label">Target</div><div class="sb-val" style="color:var(--green)">${sc.targetScore}</div></div>
          <div class="sb-score-box"><div class="sb-label">Tasks</div><div class="sb-val">${prog.done}<span style="font-size:12px;color:var(--ink-tertiary)">/${prog.total}</span></div></div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="apple-btn small" onclick="openScoreModal('${subj}')">Set Configure Score</button>
      </div>
      ${sc.note?`<div class="score-note-box" onmouseup="handleNoteSelection('${subj}')">${parseInlineHighlight(subj,sc.note)}</div>`:''}
    </div>`;
  }

  // Score Breakdown Grid
  html += `<div class="score-overview-grid">
    ${Object.keys(customSubjects).map(key => {
      const s = customSubjects[key]; const ssc = subjectScores[key]||{maxScore:100,currentScore:0,targetScore:90,modules:[],note:''};
      return `<div class="score-card" onclick="openScoreModal('${key}')">
        <div class="score-card-title"><span style="width:8px;height:8px;border-radius:3px;background:${s.color}"></span>${esc(s.label)}</div>
        <div class="score-numbers"><span class="score-curr" style="color:${s.color}">${ssc.currentScore}</span><span class="score-max">/ ${ssc.maxScore}</span></div>
        <div class="score-target-pill">Target: ${ssc.targetScore}</div>
        <div class="score-module-list">${(ssc.modules||[]).map(m=>`<div class="score-module-item"><span>${esc(m.name)} ${m.duration?`<span style="color:var(--orange);background:rgba(255,159,10,0.1);padding:1px 5px;border-radius:4px;font-size:10px;margin-left:4px">${esc(m.duration)}</span>`:''}</span><span>${m.score}pts</span></div>`).join('')}</div>
      </div>`;
    }).join('')}
  </div>`;

  // Filter Bar
  html += renderResFilterBar();

  // Exercises Section
  let ex = exercises.filter(e => !subj || e.subject===subj);
  if(resViewState.filterSubject!=='all') ex = ex.filter(e=>e.subject===resViewState.filterSubject);
  if(resViewState.filterPriority!=='all') ex = ex.filter(e=>e.priority===resViewState.filterPriority);
  if(resViewState.filterStatus!=='all') ex = ex.filter(e=>e.status===resViewState.filterStatus);
  if(resViewState.filterType==='all'||resViewState.filterType==='exercises') {
    const overdueCount = getOverdueCount();
    html += `<div class="res-section" id="exercisesSection">
      <div class="res-section-head">
        <div style="display:flex;align-items:center;gap:10px">
          <h3>Tasks Exercise Bank <span class="count-pill">${ex.length}</span></h3>
          ${overdueCount>0?`<button class="apple-btn small danger" onclick="openOverdueModal()">! Overdue (${overdueCount})</button>`:`<span style="font-size:11px;color:var(--green);font-weight:600">OK All on track</span>`}
        </div>
        <button class="apple-btn primary" onclick="openExerciseModal('${subj}')">+ Add Exercise</button>
      </div>
      ${ex.length?`<div class="exercise-list">${ex.map(e=>exerciseCard(e)).join('')}</div>`:`<div class="empty-state">No exercises</div>`}
    </div>`;
  }

  // Resources Section
  if(resViewState.filterType==='all'||resViewState.filterType==='resources') {
    let res = resources.filter(r=>!subj||r.subject===subj);
    if(resViewState.filterSubject!=='all') res = res.filter(r=>r.subject===resViewState.filterSubject);
    const notStarted = res.filter(r=>r.status==='not_started'||(r.startDate&&r.startDate>todayISO()));
    const pending = res.filter(r=>r.status==='pending'&&(!r.startDate||r.startDate<=todayISO()));
    const completed = res.filter(r=>r.status==='completed');
    let displayed = [...res];
    if(resViewState.resTab==='not_started') displayed=notStarted;
    if(resViewState.resTab==='pending') displayed=pending;
    if(resViewState.resTab==='completed') displayed=completed;

    html += `<div class="res-section" id="resourcesSection">
      <div class="res-section-head">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <h3> Resources <span class="count-pill">${displayed.length}</span></h3>
          <div class="res-tab-bar">
            <button class="res-tab-btn ${resViewState.resTab==='all'?'active':''}" onclick="resViewState.resTab='all';render()">All (${res.length})</button>
            <button class="res-tab-btn ${resViewState.resTab==='not_started'?'active':''}" onclick="resViewState.resTab='not_started';render()">Not Started (${notStarted.length})</button>
            <button class="res-tab-btn ${resViewState.resTab==='pending'?'active':''}" onclick="resViewState.resTab='pending';render()">In Progress (${pending.length})</button>
            <button class="res-tab-btn ${resViewState.resTab==='completed'?'active':''}" onclick="resViewState.resTab='completed';render()">Done (${completed.length})</button>
          </div>
        </div>
        <button class="apple-btn primary" onclick="openResourceModal('${subj}')">+ Add Resource</button>
      </div>
      ${displayed.length?`<div class="resource-grid">${displayed.map(r=>resourceCard(r)).join('')}</div>`:`<div class="empty-state">No resources</div>`}
    </div>`;
  }

  container.innerHTML = html;
}

// Resource Card

  const statusText = isDone?'Completed':isNotStarted?`Plan: ${r.startDate||'Not set'}`:'In Progress';
  const statusColor = isDone?'var(--green)':isNotStarted?'var(--orange)':'var(--ink-secondary)';
  const statusBg = isDone?'rgba(48,209,88,0.1)':isNotStarted?'rgba(255,159,10,0.1)':'var(--bg-elev)';

  return `<div class="res-card ${isDone?'completed':''}" data-id="${r.id}">
    <div class="res-top">
      <div class="res-title-wrap">
        <span class="drag-handle">::</span>
        <div class="res-check ${isDone?'checked':''}" onclick="toggleResourceStatus('${r.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L19 7"/></svg>
        </div>
        <div class="res-title">${esc(r.title)}</div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="apple-btn small" onclick="openEditResourceModal('${r.id}')">Edit</button>
        <button class="res-tool-btn delete" onclick="deleteResource('${r.id}')">Del</button>
      </div>
    </div>
    <div class="res-path">${esc(r.path||'—')}</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:10px;font-weight:700;color:${statusColor};background:${statusBg};padding:2px 7px;border-radius:6px">${statusText}</span>
